rules:
  - id: noah-python-graphql-phase1-pattern
    severity: WARNING
    languages:
      - python
    message: |
      graphql-scanner Phase 1 sink/source 패턴 매치 (Python 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'graphene\b'
      - pattern-regex: 'strawberry\b'
      - pattern-regex: 'ariadne\b'
      - pattern-regex: 'GraphQL\s*\('
      - pattern-regex: 'GraphQLView\b'
      - pattern-regex: '__schema\b'
      - pattern-regex: 'introspection'
      - pattern-regex: 'IntrospectionQuery'
      - pattern-regex: '__type\b'
      - pattern-regex: 'debug\s*=\s*True'
      - pattern-regex: 'stacktrace'
      - pattern-regex: 'formatError'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-285: GraphQL Authorization"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
