rules:
  - id: noah-javascript-graphql-phase1-pattern
    severity: WARNING
    languages:
      - javascript
    message: |
      graphql-scanner Phase 1 sink/source 패턴 매치 (JavaScript 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'apollo-server'
      - pattern-regex: 'ApolloServer\b'
      - pattern-regex: 'express-graphql'
      - pattern-regex: 'graphql-yoga'
      - pattern-regex: 'createYoga\s*\('
      - pattern-regex: '__schema\b'
      - pattern-regex: 'introspection'
      - pattern-regex: 'IntrospectionQuery'
      - pattern-regex: '__type\b'
      - pattern-regex: 'depthLimit\s*\('
      - pattern-regex: 'formatError\s*:'
      - pattern-regex: 'maskedErrors'
      - pattern-regex: 'stacktrace'
      - pattern-regex: 'debug\s*:\s*true'
      - pattern-regex: 'node-serialize'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-285: GraphQL Authorization"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
