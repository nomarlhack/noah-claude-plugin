rules:
  - id: noah-kotlin-graphql-phase1-pattern
    severity: WARNING
    languages:
      - kotlin
    message: |
      graphql-scanner Phase 1 sink/source 패턴 매치 (Kotlin 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'graphql-kotlin\b'
      - pattern-regex: 'GraphQL\.newGraphQL\b'
      - pattern-regex: 'ExecutionInput\b'
      - pattern-regex: 'DataFetchingEnvironment\b'
      - pattern-regex: 'SimpleKotlinDataFetcherExceptionHandler\b'
      - pattern-regex: 'MaxQueryDepthInstrumentation\b'
      - pattern-regex: 'MaxQueryComplexityInstrumentation\b'
      - pattern-regex: '__schema\b'
      - pattern-regex: 'introspection'
      - pattern-regex: 'IntrospectionQuery'
      - pattern-regex: '__type\b'
      - pattern-regex: 'includeStacktraceInErrorResponses\s*=\s*true'
      - pattern-regex: 'LogExceptionWhileDataFetching\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-285: GraphQL Authorization"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
