rules:
  - id: noah-graphql-introspection-forward-taint
    severity: ERROR
    languages:
      - javascript
      - typescript
    mode: taint
    message: |
      GraphQL 게이트웨이/프록시가 클라이언트 query를 parse 후 validate() 없이 백엔드로
      forward. parseGraphQL/parse/gql 결과가 NoSchemaIntrospectionCustomRule·depth-limit·
      complexity 등 validation rule을 거치지 않고 executeQuery/forward로 흐르면 introspection
      (__schema/__type) 노출 + depth/complexity DoS가 게이트웨이 레이어에서 차단되지 않음.
      안전: validate(schema, ast, [NoSchemaIntrospectionCustomRule, depthLimit(...)]) 적용 후 forward.
    pattern-sources:
      - pattern: ctx.request.body
      - pattern: req.body
      - patterns:
          - pattern: $Q
          - pattern-inside: |
              const { query, ... } = $FORM.parse(ctx.request.body)
      - patterns:
          - pattern: $Q
          - pattern-inside: |
              const { query, ... } = $FORM.parse(req.body)
      - patterns:
          - pattern: $Q
          - pattern-inside: |
              const $Q = ctx.request.body.query
    pattern-sinks:
      # parse 결과를 백엔드 forward 함수에 전달
      - pattern: $SVC.executeQuery($DEV, parseGraphQL($Q), ...)
      - pattern: $SVC.executeQueryForApp($U, $A, parseGraphQL($Q), ...)
      - pattern: $SVC.query($A, parseGraphQL($Q), ...)
      - pattern: $SVC.query(parseGraphQL($Q), ...)
      - pattern: $SVC.forward(parseGraphQL($Q), ...)
      - pattern: parseGraphQL($Q)
      - pattern: parse($Q)
      - pattern: gql($Q)
    pattern-sanitizers:
      # validate() + introspection/depth rule 적용 시 안전
      - pattern: validate($SCHEMA, $AST, ...)
      - pattern: validate($SCHEMA, $AST)
      - patterns:
          - pattern: $Q
          - pattern-inside: |
              if ($Q.includes('__schema') || ...) { ... }
      - patterns:
          - pattern: $Q
          - pattern-inside: |
              if (/__schema|__type/.test($Q)) { ... }
      - pattern: NoSchemaIntrospectionCustomRule
      - pattern: depthLimit(...)
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-200: Information Exposure (GraphQL Introspection)"
      confidence: MEDIUM
      likelihood: HIGH
      impact: MEDIUM
      vulnerability_class:
        - Information Disclosure
      owasp:
        - "A05:2021 Security Misconfiguration"
      technology:
        - nodejs
        - graphql
        - koa
        - express
