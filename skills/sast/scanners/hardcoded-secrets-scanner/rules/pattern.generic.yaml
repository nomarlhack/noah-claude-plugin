rules:
  - id: noah-hardcoded-secrets-phase1-pattern
    severity: ERROR
    languages:
      - generic
    message: |
      하드코딩된 비밀값 감지 — 코드에 직접 삽입된 API key/password/token/private key.
      버전 관리 시스템에 영구 기록되어 모든 접근자에게 노출됨.
      환경 변수(os.environ, process.env) 또는 시크릿 매니저로 이전하세요.
    pattern-either:
      # API Key 패턴 — 공급자별 prefix 포함 고엔트로피 값
      - pattern-regex: '(?i)(api[_-]?key|apikey)\s*[=:]\s*[''"][a-zA-Z0-9_\-]{20,}[''"]'
      - pattern-regex: '(?i)(secret[_-]?key|secret_access_key)\s*[=:]\s*[''"][a-zA-Z0-9_\-/+]{20,}[''"]'
      - pattern-regex: '(?i)(access[_-]?token|auth[_-]?token|bearer[_-]?token)\s*[=:]\s*[''"][a-zA-Z0-9_\-\.]{20,}[''"]'
      # 공급자별 알려진 prefix
      - pattern-regex: '(?:sk|pk)[-_](test|live|prod)_[a-zA-Z0-9]{24,}'
      - pattern-regex: 'sk-[a-zA-Z0-9]{48}'
      - pattern-regex: 'ghp_[a-zA-Z0-9]{36}'
      - pattern-regex: 'gho_[a-zA-Z0-9]{36}'
      - pattern-regex: 'github_pat_[a-zA-Z0-9_]{82}'
      - pattern-regex: 'AKIA[0-9A-Z]{16}'
      - pattern-regex: 'AIzaSy[0-9A-Za-z\-_]{33}'
      # Django/Rails 프레임워크 secret key
      - pattern-regex: '(?i)(secret[_-]?key)\s*[=:]\s*[''"][^${\s(]{20,}[''"]'
      # DB 비밀번호 하드코딩
      - pattern-regex: '(?i)(db[_-]?pass(word)?|database[_-]?pass(word)?|mysql[_-]?pass|postgres[_-]?pass)\s*[=:]\s*[''"][^${\s]{8,}[''"]'
      # JWT secret 하드코딩
      - pattern-regex: '(?i)(jwt[_-]?secret|token[_-]?secret|signing[_-]?key)\s*[=:]\s*[''"][^${\s]{8,}[''"]'
      # Private Key PEM 블록
      - pattern-regex: '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
      # 일반 password 할당 (따옴표 있는 형식)
      - pattern-regex: '(?i)password\s*[=:]\s*[''"][^${\s]{8,}[''"]'
      # OAuth client secret
      - pattern-regex: '(?i)(client[_-]?secret|oauth[_-]?secret)\s*[=:]\s*[''"][a-zA-Z0-9_\-]{16,}[''"]'
      # ── 범용 비따옴표 형식 ─────────────────────────────────────────────────
      # YAML / Properties / 환경설정 파일의 key: value 형식 (따옴표 없음)
      # 지원 키 이름: password, token, secret, api_key, apiKey, access_key,
      #   accessKey, secretAccessKey, role-id, secret-id, credentials,
      #   aws_access_key, aws_secret_key, bearer 등 주요 시크릿 키워드
      # 제외: 주석(#), 환경변수 참조(${...}/$(...)}, 5자 이하, placeholder 값
      #       (your-, example-, changeme, REPLACE, test-, dummy, null, xxxx 등)
      # 점 구분 복합 키(spring.security.token)도 지원
      - pattern-regex: '(?i)^(?![ \t]*#)[ \t]*(?:[a-zA-Z0-9._\-]*\.)?(password|passwd|pwd|secret[_\-]?key|secret[_\-]?access[_\-]?key|client[_\-]?secret|shared[_\-]?secret|api[_\-]?key|apikey|access[_\-]?key|access[_\-]?token|auth[_\-]?token|auth[_\-]?key|private[_\-]?key|signing[_\-]?key|encryption[_\-]?key|aws[_\-]access[_\-]key|aws[_\-]secret[_\-]?key|aws[_\-]session[_\-]token|gcp[_\-]key|service[_\-]account[_\-]key|token|secret|role[-_]id|secret[-_]id|credentials?|bearer)\s*[=:]\s*(?![\$\{\s#])(?!your[-_])(?!example[-_]?)(?!<[^>]{1,50}>)(?!REPLACE)(?!CHANGEME|changeme)(?!TODO|todo)(?!DUMMY|dummy)(?!FAKE|fake)(?!TEST[_\-]|test[_\-])(?!SAMPLE|sample)(?!x{4,})(?!none|null|empty)(?!true|false)([^\s#''\"]{6,})'
      # 변수 할당 형식 — 따옴표 있는 값 (Kotlin val, Java final, Python, JS const 등)
      # val/var/const/let/final 등 키워드 뒤에 시크릿 변수명과 문자열 리터럴
      - pattern-regex: '(?i)(?:^|[^a-zA-Z0-9_])(password|passwd|pwd|secret[_\-]?key|secret[_\-]?access[_\-]?key|client[_\-]?secret|api[_\-]?key|apikey|access[_\-]?key|access[_\-]?token|auth[_\-]?token|private[_\-]?key|signing[_\-]?key|aws[_\-]access[_\-]key|aws[_\-]secret[_\-]?key|token|secret|credentials?|bearer)\s*[=:]\s*[''"`](?!your[-_])(?!example[-_]?)(?!<[^>]{1,50}>)(?!REPLACE)(?!CHANGEME|changeme)(?!TEST[_\-]|test[_\-])(?!DUMMY|dummy)(?!x{4,})([a-zA-Z0-9._\-/+=!@#$%^&*:]{12,})[''"`]'
      # Android 안전하지 않은 저장 모드 (world-readable/writeable = 타 앱 노출)
      - pattern-regex: 'MODE_WORLD_READABLE'
      - pattern-regex: 'MODE_WORLD_WRITEABLE'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
        - "CWE-259: Use of Hard-coded Password"
      confidence: MEDIUM
      likelihood: HIGH
      impact: HIGH
      vulnerability_class:
        - Hardcoded Credentials
      owasp:
        - "A02:2021 Cryptographic Failures"
        - "LLM06:2025 Sensitive Information Disclosure"
