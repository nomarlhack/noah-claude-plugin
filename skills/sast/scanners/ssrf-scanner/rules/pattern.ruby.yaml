rules:
  - id: noah-ruby-ssrf-phase1-pattern
    severity: WARNING
    languages:
      - ruby
    message: |
      ssrf-scanner Phase 1 sink/source 패턴 매치 (Ruby 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # Ruby HTTP 클라이언트 sinks
      - pattern-regex: 'Net::HTTP'
      - pattern-regex: 'open-uri'
      - pattern-regex: 'URI\.open\s*\('
      - pattern-regex: 'HTTParty\.'
      - pattern-regex: 'Faraday\.new\s*\('
      - pattern-regex: 'Faraday\.get\s*\('
      - pattern-regex: 'RestClient\.'
      - pattern-regex: 'Typhoeus\.'
      - pattern-regex: 'Excon\.'
      # source
      - pattern-regex: 'params\['
      - pattern-regex: 'request\.params\['
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-918: Server-Side Request Forgery"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
