rules:
  - id: noah-java-ssrf-taint
    severity: ERROR
    languages:
      - java
    mode: taint
    message: |
      Java Spring RestTemplate/WebClient/HttpURLConnection에 컨트롤러 입력 URL이
      들어가면 SSRF. 안전: URL 호스트 화이트리스트 + 내부망 IP 차단.
    pattern-sources:
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @RequestParam $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @RequestParam(...) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @PathVariable $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @RequestBody $X, ...) { ... }
      # JAX-RS / Jersey / Quarkus — REST resource method parameters
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @QueryParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @PathParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @FormParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @HeaderParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @MatrixParam($K) $X, ...) { ... }
      # Vert.x (reactive web)
      - pattern: $CTX.queryParam($K)
      - pattern: $CTX.queryParam($K).get(0)
      - pattern: $CTX.pathParam($K)
      - pattern: $CTX.body().asString()
      - pattern: $CTX.body().asJsonObject()
      - pattern: $REQ.getParam($K)
      - pattern: $REQ.params().get($K)
      # Struts2 / Struts1 — ActionContext / ActionForm
      - pattern: ActionContext.getContext().getParameters()
      - pattern: $FORM.get($K)
      - pattern: $SERVLET.getParameter($K)
      - pattern: $SERVLET.getParameterValues($K)
    pattern-sinks:
      - pattern: restTemplate.getForObject($X, ...)
      - pattern: restTemplate.getForEntity($X, ...)
      - pattern: restTemplate.postForObject($X, ...)
      - pattern: restTemplate.postForEntity($X, ...)
      - pattern: restTemplate.exchange($X, ...)
      - pattern: webClient.get().uri($X)
      - pattern: webClient.post().uri($X)
      - pattern: webClient.uri($X)
      - pattern: new URL($X)
      - pattern: new URL($X, ...)
      - pattern: HttpClient.newHttpClient().send($REQ, ...)
      - pattern: HttpRequest.newBuilder().uri(URI.create($X))
      # OkHttp
      - pattern: "Request.Builder().url($X).build()"
      - pattern: "OkHttpClient().newCall(Request.Builder().url($X).build())"
      - pattern: $BUILDER.url($X)
      # Apache HttpClient 4 (CloseableHttpClient)
      - pattern: HttpClients.createDefault().execute(new HttpGet($X))
      - pattern: $CLIENT.execute(new HttpGet($X))
      - pattern: $CLIENT.execute(new HttpPost($X))
      - pattern: new HttpGet($X)
      - pattern: new HttpPost($X)
      - pattern: new HttpPut($X)
      - pattern: new HttpDelete($X)
      # Apache HttpClient 5 (CloseableHttpClient 5.x)
      - pattern: ClassicRequestBuilder.get($X)
      - pattern: ClassicRequestBuilder.post($X)
      # Spring 6 RestClient
      - pattern: RestClient.create($X)
      - pattern: $RC.get().uri($X)
      - pattern: $RC.post().uri($X)
      - pattern: $RC.put().uri($X)
      # JAX-RS Client API
      - pattern: ClientBuilder.newClient().target($X)
      - pattern: $CLIENT.target($X)
      - pattern: $WT.path($X)
      # OpenFeign — URL은 @FeignClient baseUrl로 제어 (동적 URL은 드묾)
      - pattern: $FEIGN.target($T, $X)
    pattern-sanitizers:
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if ($WHITELIST.contains($X)) { ... }
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-918: Server-Side Request Forgery"]
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      vulnerability_class: [SSRF]
      owasp: ["A10:2021 Server-Side Request Forgery"]
      technology: [java, spring, resttemplate, webclient]
