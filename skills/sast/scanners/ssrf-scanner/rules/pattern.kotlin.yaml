rules:
  - id: noah-kotlin-ssrf-phase1-pattern
    severity: WARNING
    languages:
      - kotlin
    message: |
      ssrf-scanner Phase 1 sink/source 패턴 매치 (Kotlin 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # Kotlin/Spring HTTP 클라이언트 sink
      - pattern-regex: 'RestTemplate\s*\('
      - pattern-regex: 'WebClient\.'
      - pattern-regex: 'OkHttpClient\s*\('
      - pattern-regex: 'HttpClient\.newHttpClient\s*\('
      - pattern-regex: 'HttpRequest\.newBuilder\s*\('
      - pattern-regex: 'URL\s*\('
      - pattern-regex: 'URI\.create\s*\('
      # Ktor client
      - pattern-regex: 'HttpClient\s*\('
      # Spring source annotation
      - pattern-regex: '@RequestParam'
      - pattern-regex: '@PathVariable'
      - pattern-regex: '@RequestBody'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-918: Server-Side Request Forgery"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
