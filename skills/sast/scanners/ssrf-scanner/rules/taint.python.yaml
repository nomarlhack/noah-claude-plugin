rules:
  - id: noah-python-ssrf-taint
    severity: ERROR
    languages:
      - python
    mode: taint
    message: |
      Python requests.get/urllib.urlopen/httpx에 사용자 제어 URL이 직접 들어가면 SSRF.
      안전: URL 화이트리스트 또는 ipaddress 모듈로 내부망 차단.
    pattern-sources:
      - pattern: request.GET[$K]
      - pattern: request.POST[$K]
      - pattern: request.args.get($K, ...)
      - pattern: request.form.get($K, ...)
      - pattern: request.json
      - pattern: request.body
      # Tornado RequestHandler
      - pattern: self.get_argument($K)
      - pattern: self.get_argument($K, $DEFAULT)
      - pattern: self.get_body_argument($K)
      - pattern: self.get_query_argument($K)
      - pattern: self.request.arguments
      - pattern: self.request.body
      - pattern: self.request.body_arguments
      # Sanic
      - pattern: request.args.get($K)
      - pattern: request.args[$K]
      - pattern: request.form.get($K)
      - pattern: request.form[$K]
      - pattern: request.json
      - pattern: request.json.get($K)
      - pattern: await request.json()
      - pattern: request.raw_args[$K]
    pattern-sinks:
      - pattern: requests.get($X, ...)
      - pattern: requests.post($X, ...)
      - pattern: requests.put($X, ...)
      - pattern: requests.delete($X, ...)
      - pattern: requests.request($M, $X, ...)
      - pattern: urllib.request.urlopen($X, ...)
      - pattern: urllib2.urlopen($X, ...)
      - pattern: urlopen($X, ...)
      - pattern: httpx.get($X, ...)
      - pattern: httpx.post($X, ...)
      - pattern: aiohttp.ClientSession().get($X, ...)
      - pattern: aiohttp.request($M, $X, ...)
      # httpx async client
      - pattern: "httpx.AsyncClient().get($X, ...)"
      - pattern: "httpx.AsyncClient().post($X, ...)"
      - pattern: "await $CLIENT.get($X, ...)"
      - pattern: "await $CLIENT.post($X, ...)"
      # requests.Session
      - pattern: $SESSION.get($X, ...)
      - pattern: $SESSION.post($X, ...)
      - pattern: $SESSION.put($X, ...)
      - pattern: $SESSION.request($M, $X, ...)
      # urllib3
      - pattern: "$POOL.request($M, $X, ...)"
      - pattern: "urllib3.PoolManager().request($M, $X, ...)"
      # pycurl
      - pattern: "$C.setopt(pycurl.URL, $X)"
      # grequests
      - pattern: "grequests.get($X, ...)"
      - pattern: "grequests.post($X, ...)"
      # boto3 / AWS SDK (S3 presigned URL 등)
      - pattern: "$S3.generate_presigned_url($OP, Params={..., 'Bucket': $X, ...})"
    pattern-sanitizers:
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if $X in $WHITELIST:
                  ...
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if urlparse($X).netloc in $WHITELIST:
                  ...
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-918: Server-Side Request Forgery"]
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      vulnerability_class: [SSRF]
      owasp: ["A10:2021 Server-Side Request Forgery"]
      technology: [python, requests, httpx, aiohttp]
