rules:
  - id: noah-ruby-xxe-phase1-pattern
    severity: WARNING
    languages:
      - ruby
    message: |
      xxe-scanner Phase 1 sink/source 패턴 매치 (Ruby 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'Nokogiri::XML\b'
      - pattern-regex: 'Nokogiri\.XML\b'
      - pattern-regex: 'REXML::Document\b'
      - pattern-regex: 'Ox\.parse\s*\('
      - pattern-regex: 'Ox\.load\s*\('
      - pattern-regex: 'nonet\b'
      - pattern-regex: 'noent\b'
      - pattern-regex: '<!DOCTYPE\b'
      - pattern-regex: 'SYSTEM\s+[''"]'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-611: XML External Entity"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
