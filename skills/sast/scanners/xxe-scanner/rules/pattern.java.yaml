rules:
  - id: noah-java-xxe-phase1-pattern
    severity: WARNING
    languages:
      - java
    message: |
      xxe-scanner Phase 1 sink/source 패턴 매치 (Java 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'DocumentBuilderFactory\b'
      - pattern-regex: 'SAXParserFactory\b'
      - pattern-regex: 'XMLInputFactory\b'
      - pattern-regex: 'TransformerFactory\b'
      - pattern-regex: 'SchemaFactory\b'
      - pattern-regex: 'XPathFactory\b'
      - pattern-regex: 'setExpandEntityReferences\s*\('
      - pattern-regex: 'disallow-doctype-decl'
      - pattern-regex: 'external-general-entities'
      - pattern-regex: 'external-parameter-entities'
      - pattern-regex: 'SUPPORT_DTD'
      - pattern-regex: 'XMLReader\b'
      - pattern-regex: '<!DOCTYPE\b'
      - pattern-regex: 'SYSTEM\s+[''"]'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-611: XML External Entity"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
