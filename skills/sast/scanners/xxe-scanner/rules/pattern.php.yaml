rules:
  - id: noah-php-xxe-phase1-pattern
    severity: WARNING
    languages:
      - php
    message: |
      xxe-scanner Phase 1 sink/source 패턴 매치 (PHP 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'simplexml_load_string\s*\('
      - pattern-regex: 'simplexml_load_file\s*\('
      - pattern-regex: 'DOMDocument\b'
      - pattern-regex: 'XMLReader\b'
      - pattern-regex: 'xml_parse\s*\('
      - pattern-regex: 'libxml_disable_entity_loader'
      - pattern-regex: 'LIBXML_NOENT\b'
      - pattern-regex: '<!DOCTYPE\b'
      - pattern-regex: 'SYSTEM\s+[''"]'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-611: XML External Entity"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
