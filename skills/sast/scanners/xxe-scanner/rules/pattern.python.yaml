rules:
  - id: noah-python-xxe-phase1-pattern
    severity: WARNING
    languages:
      - python
    message: |
      xxe-scanner Phase 1 sink/source 패턴 매치 (Python 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'lxml\.etree\b'
      - pattern-regex: 'xml\.etree\b'
      - pattern-regex: 'minidom\b'
      - pattern-regex: 'pulldom\b'
      - pattern-regex: 'expatbuilder\b'
      - pattern-regex: 'xmltodict\b'
      - pattern-regex: 'resolve_entities'
      - pattern-regex: 'load_external_dtd'
      - pattern-regex: 'noent'
      - pattern-regex: 'defusedxml\b'
      - pattern-regex: '<!DOCTYPE\b'
      - pattern-regex: 'SYSTEM\s+[''"]'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-611: XML External Entity"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
