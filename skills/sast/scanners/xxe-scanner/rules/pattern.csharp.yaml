rules:
  - id: noah-csharp-xxe-phase1-pattern
    severity: WARNING
    languages:
      - csharp
    message: |
      xxe-scanner Phase 1 sink/source 패턴 매치 (C# 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'XmlReader\b'
      - pattern-regex: 'XmlDocument\b'
      - pattern-regex: 'XPathDocument\b'
      - pattern-regex: 'XmlTextReader\b'
      - pattern-regex: 'XmlSerializer\b'
      - pattern-regex: 'DtdProcessing\b'
      - pattern-regex: 'ProhibitDtd\b'
      - pattern-regex: 'XmlResolver\b'
      - pattern-regex: '<!DOCTYPE\b'
      - pattern-regex: 'SYSTEM\s+[''"]'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-611: XML External Entity"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
