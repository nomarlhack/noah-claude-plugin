rules:
  - id: noah-php-xxe-taint
    severity: ERROR
    languages:
      - php
    mode: taint
    message: |
      PHP $_GET/$_POST/php://input 등 사용자 XML이 simplexml_load_string /
      DOMDocument::loadXML에 LIBXML_NOENT 플래그와 함께 들어가면 XXE.
      안전: libxml_disable_entity_loader(true) (PHP < 8.0), LIBXML_NOENT 미사용.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_GET[...];
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_POST[...];
      - patterns:
          - pattern: $X
          - pattern-inside: $X = file_get_contents("php://input");
      # Laravel (Illuminate\Http\Request)
      - pattern: $REQ->input($K)
      - pattern: $REQ->input($K, $DEFAULT)
      - pattern: $REQ->get($K)
      - pattern: $REQ->get($K, $DEFAULT)
      - pattern: $REQ->query($K)
      - pattern: $REQ->query($K, $DEFAULT)
      - pattern: $REQ->post($K)
      - pattern: $REQ->post($K, $DEFAULT)
      - pattern: $REQ->all()
      - pattern: $REQ->only($KEYS)
      - pattern: $REQ->except($KEYS)
      - pattern: $REQ->json($K)
      - pattern: $REQ->json($K, $DEFAULT)
      - pattern: $REQ->header($K)
      - pattern: $REQ->cookie($K)
      - pattern: request()->input($K)
      - pattern: request()->get($K)
      # Symfony (HttpFoundation\Request)
      - pattern: $REQ->query->get($K)
      - pattern: $REQ->request->get($K)
      - pattern: $REQ->attributes->get($K)
      - pattern: $REQ->headers->get($K)
      - pattern: $REQ->cookies->get($K)
      - pattern: $REQ->getContent()
      # CodeIgniter 3/4
      - pattern: $CI->input->get($K)
      - pattern: $CI->input->post($K)
      - pattern: $CI->input->get_post($K)
      - pattern: $CI->input->server($K)
      - pattern: $this->input->get($K)
      - pattern: $this->input->post($K)
      - pattern: $this->request->getVar($K)
      - pattern: $this->request->getGet($K)
      - pattern: $this->request->getPost($K)
    pattern-sinks:
      - pattern: simplexml_load_string($X, ...)
      - pattern: simplexml_load_string($X)
      - pattern: simplexml_load_file($X)
      - pattern: $DOC->loadXML($X)
      - pattern: $DOC->loadXML($X, ...)
      - pattern: $DOC->load($X)
      # XMLReader
      - pattern: XMLReader::open($X)
      - pattern: $XR->open($X)
      - pattern: $XR->XML($X)
      # xml_parse / xml_parse_into_struct (expat)
      - pattern: xml_parse($PARSER, $X, ...)
      - pattern: xml_parse_into_struct($PARSER, $X, ...)
    pattern-sanitizers:
      - pattern: libxml_disable_entity_loader(true)
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-611: XML External Entity"]
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
      vulnerability_class: [XXE]
      owasp: ["A05:2021 Security Misconfiguration"]
      technology: [php]
