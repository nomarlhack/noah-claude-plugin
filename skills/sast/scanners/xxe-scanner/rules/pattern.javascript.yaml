rules:
  - id: noah-javascript-xxe-phase1-pattern
    severity: WARNING
    languages:
      - javascript
    message: |
      xxe-scanner Phase 1 sink/source 패턴 매치 (JavaScript 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'libxmljs\b'
      - pattern-regex: 'xmldom\b'
      - pattern-regex: 'fast-xml-parser'
      - pattern-regex: 'xml2js\b'
      - pattern-regex: 'DOMParser\b'
      - pattern-regex: 'parseFromString\s*\('
      - pattern-regex: 'noent\b'
      - pattern-regex: 'processEntities'
      - pattern-regex: '<!DOCTYPE\b'
      - pattern-regex: 'SYSTEM\s+[''"]'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-611: XML External Entity"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
