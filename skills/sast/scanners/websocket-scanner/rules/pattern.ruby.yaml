rules:
  - id: noah-ruby-wsock-phase1-pattern
    severity: WARNING
    languages:
      - ruby
    message: |
      websocket-scanner Phase 1 sink/source 패턴 매치 (Ruby 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'ActionCable\b'
      - pattern-regex: 'ActionCable::Channel\b'
      - pattern-regex: 'faye-websocket\b'
      - pattern-regex: 'em-websocket\b'
      - pattern-regex: '\.receive\s*\('
      - pattern-regex: 'allowed_request_origins\b'
      - pattern-regex: 'wss://'
      - pattern-regex: 'ws://'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-352: WebSocket Origin Bypass"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
