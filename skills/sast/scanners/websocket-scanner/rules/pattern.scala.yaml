rules:
  - id: noah-scala-wsock-phase1-pattern
    severity: WARNING
    languages:
      - scala
    message: |
      websocket-scanner Phase 1 sink/source 패턴 매치 (Scala 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'handleWebSocketMessages\b'
      - pattern-regex: 'WebSocketHandler\b'
      - pattern-regex: 'ActorRef\b'
      - pattern-regex: 'wss://'
      - pattern-regex: 'ws://'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-352: WebSocket Origin Bypass"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
