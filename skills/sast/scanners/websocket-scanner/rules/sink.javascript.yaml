rules:
  - id: noah-javascript-wsock-origin-bypass-sink
    severity: ERROR
    languages:
      - javascript
      - typescript
    message: |
      WebSocket 서버에서 Origin 검증이 비활성화되어 있어 CSRF/Origin bypass 가능.
      verifyClient: () => true 또는 allowedOrigins: ['*'] 설정은 모든 출처의 연결을 허용.
      안전: verifyClient에서 req.headers.origin을 허용 목록과 비교 검증.
    pattern-either:
      # ws WebSocketServer — verifyClient 항상 true
      - pattern: "new WebSocketServer({..., verifyClient: () => true, ...})"
      - pattern: "new WebSocketServer({..., verifyClient: ($INFO) => true, ...})"
      - pattern: "new Server({..., verifyClient: () => true, ...})"
      # ws — verifyClient 콜백에서 done(true) 무조건 호출
      - patterns:
          - pattern: $CB(true, ...)
          - pattern-inside: |
              new WebSocketServer({..., verifyClient: ($INFO, $CB) => { ... }, ...})
      # socket.io allowEIO3 / cors origin: '*'
      - pattern: "new Server($SRV, {..., cors: { origin: '*' }, ...})"
      - pattern: "new Server($SRV, {..., cors: { origin: true }, ...})"
      # express-ws — no verifyClient
      - pattern-regex: 'expressWs\s*\(\s*\w+\s*\)[^;]*;\s*(?!.*verifyClient)'
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-346: Origin Validation Error"]
      confidence: HIGH
      likelihood: HIGH
      impact: MEDIUM
      vulnerability_class: [CSRF, Origin Bypass]
      owasp: ["A07:2021 Identification and Authentication Failures"]
      technology: [nodejs, websocket, ws, socket.io]
