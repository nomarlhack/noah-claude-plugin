rules:
  - id: noah-go-wsock-phase1-pattern
    severity: WARNING
    languages:
      - go
    message: |
      websocket-scanner Phase 1 sink/source 패턴 매치 (Go 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'gorilla/websocket\b'
      - pattern-regex: 'websocket\.Upgrader\b'
      - pattern-regex: 'CheckOrigin\b'
      - pattern-regex: 'InsecureSkipVerify\b'
      - pattern-regex: '\.Upgrade\s*\('
      - pattern-regex: '\.ReadMessage\s*\('
      - pattern-regex: '\.WriteMessage\s*\('
      - pattern-regex: 'wss://'
      - pattern-regex: 'ws://'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-352: WebSocket Origin Bypass"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
