rules:
  - id: noah-csharp-wsock-phase1-pattern
    severity: WARNING
    languages:
      - csharp
    message: |
      websocket-scanner Phase 1 sink/source 패턴 매치 (C# 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'WebSocket\b'
      - pattern-regex: 'AcceptWebSocketAsync\s*\('
      - pattern-regex: 'SignalR\b'
      - pattern-regex: 'IHubContext\b'
      - pattern-regex: '\.ReceiveAsync\s*\('
      - pattern-regex: '\.SendAsync\s*\('
      - pattern-regex: 'wss://'
      - pattern-regex: 'ws://'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-352: WebSocket Origin Bypass"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
