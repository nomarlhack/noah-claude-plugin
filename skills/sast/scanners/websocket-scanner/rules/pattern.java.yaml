rules:
  - id: noah-java-wsock-phase1-pattern
    severity: WARNING
    languages:
      - java
    message: |
      websocket-scanner Phase 1 sink/source 패턴 매치 (Java 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: '@ServerEndpoint\b'
      - pattern-regex: '@OnMessage\b'
      - pattern-regex: 'WebSocketHandler\b'
      - pattern-regex: 'TextWebSocketHandler\b'
      - pattern-regex: 'setAllowedOrigins\s*\('
      - pattern-regex: 'HandshakeInterceptor\b'
      - pattern-regex: 'SockJS\b'
      - pattern-regex: 'WebSocketSession\b'
      - pattern-regex: 'wss://'
      - pattern-regex: 'ws://'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-352: WebSocket Origin Bypass"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
