rules:
  - id: noah-php-deser-taint
    severity: ERROR
    languages:
      - php
    mode: taint
    message: |
      PHP $_GET/$_POST/$_REQUEST/$_COOKIE 값이 unserialize()에 들어가면 PHP Object
      Injection → POP chain RCE. JSON 직렬화(json_decode) 사용 또는
      unserialize($x, ['allowed_classes' => false]) 로 클래스 비허용.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_GET[...];
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_POST[...];
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_REQUEST[...];
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_COOKIE[...];
      # Laravel (Illuminate\Http\Request)
      - pattern: $REQ->input($K)
      - pattern: $REQ->input($K, $DEFAULT)
      - pattern: $REQ->get($K)
      - pattern: $REQ->get($K, $DEFAULT)
      - pattern: $REQ->query($K)
      - pattern: $REQ->query($K, $DEFAULT)
      - pattern: $REQ->post($K)
      - pattern: $REQ->post($K, $DEFAULT)
      - pattern: $REQ->all()
      - pattern: $REQ->only($KEYS)
      - pattern: $REQ->except($KEYS)
      - pattern: $REQ->json($K)
      - pattern: $REQ->json($K, $DEFAULT)
      - pattern: $REQ->header($K)
      - pattern: $REQ->cookie($K)
      - pattern: request()->input($K)
      - pattern: request()->get($K)
      # Symfony (HttpFoundation\Request)
      - pattern: $REQ->query->get($K)
      - pattern: $REQ->request->get($K)
      - pattern: $REQ->attributes->get($K)
      - pattern: $REQ->headers->get($K)
      - pattern: $REQ->cookies->get($K)
      - pattern: $REQ->getContent()
      # CodeIgniter 3/4
      - pattern: $CI->input->get($K)
      - pattern: $CI->input->post($K)
      - pattern: $CI->input->get_post($K)
      - pattern: $CI->input->server($K)
      - pattern: $this->input->get($K)
      - pattern: $this->input->post($K)
      - pattern: $this->request->getVar($K)
      - pattern: $this->request->getGet($K)
      - pattern: $this->request->getPost($K)
    pattern-sinks:
      - pattern: unserialize($X)
      - pattern: unserialize(trim($X))
      - pattern: maybe_unserialize($X)
      # WDDX (XML 기반 직렬화 — PHP 7.4 deprecated)
      - pattern: wddx_deserialize($X)
      # igbinary (바이너리 직렬화 확장)
      - pattern: igbinary_unserialize($X)
    pattern-sanitizers:
      - pattern: json_decode($X, ...)
      - pattern: 'unserialize($X, [''allowed_classes'' => false])'
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-502: Insecure Deserialization"]
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      vulnerability_class: [Deserialization]
      owasp: ["A08:2021 Software and Data Integrity Failures"]
      technology: [php]
