rules:
  - id: noah-java-deser-phase1-pattern
    severity: WARNING
    languages:
      - java
    message: |
      deserialization-scanner Phase 1 sink/source 패턴 매치 (Java 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # Java 표준 직렬화
      - pattern-regex: 'ObjectInputStream'
      - pattern-regex: 'readObject\s*\('
      - pattern-regex: 'XMLDecoder'
      - pattern-regex: 'XStream\.fromXML\s*\('
      - pattern-regex: 'SerializationUtils\.deserialize\s*\('
      # Kryo / Hessian
      - pattern-regex: 'Kryo\b'
      - pattern-regex: 'HessianInput\b'
      - pattern-regex: '\.readClassAndObject\s*\('
      # Jackson 위험 설정
      - pattern-regex: 'activateDefaultTyping'
      - pattern-regex: 'enableDefaultTyping'
      - pattern-regex: '@JsonTypeInfo'
      - pattern-regex: 'GenericJackson2JsonRedisSerializer'
      # Fastjson
      - pattern-regex: 'fastjson'
      - pattern-regex: 'parseObject\s*\('
      # SnakeYaml
      - pattern-regex: 'SnakeYaml'
      - pattern-regex: 'new\s+Yaml\s*\('
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-502: Insecure Deserialization"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
