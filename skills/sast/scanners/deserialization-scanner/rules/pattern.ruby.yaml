rules:
  - id: noah-ruby-deser-phase1-pattern
    severity: WARNING
    languages:
      - ruby
    message: |
      deserialization-scanner Phase 1 sink/source 패턴 매치 (Ruby 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'Marshal\.load\s*\('
      - pattern-regex: 'Marshal\.restore\s*\('
      - pattern-regex: 'YAML\.load\s*\('
      - pattern-regex: 'JSON\.load\s*\('
      - pattern-regex: 'MessagePack\.unpack\s*\('
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-502: Insecure Deserialization"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
