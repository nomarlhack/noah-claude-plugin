rules:
  - id: noah-csharp-deser-phase1-pattern
    severity: WARNING
    languages:
      - csharp
    message: |
      deserialization-scanner Phase 1 sink/source 패턴 매치 (C# 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'BinaryFormatter'
      - pattern-regex: 'NetDataContractSerializer'
      - pattern-regex: 'SoapFormatter'
      - pattern-regex: 'JavaScriptSerializer'
      - pattern-regex: 'TypeNameHandling'
      - pattern-regex: 'LosFormatter'
      - pattern-regex: 'ObjectStateFormatter'
      - pattern-regex: '\.Deserialize\s*\('
      - pattern-regex: 'XmlSerializer\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-502: Insecure Deserialization"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
