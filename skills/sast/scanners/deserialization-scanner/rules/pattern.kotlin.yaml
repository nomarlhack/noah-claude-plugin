rules:
  - id: noah-kotlin-deser-phase1-pattern
    severity: WARNING
    languages:
      - kotlin
    message: |
      deserialization-scanner Phase 1 sink/source 패턴 매치 (Kotlin 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # Java 표준 직렬화 (Kotlin JVM)
      - pattern-regex: 'ObjectInputStream'
      - pattern-regex: 'readObject\s*\('
      - pattern-regex: 'XStream\b'
      - pattern-regex: '\.fromXML\s*\('
      # Kryo / Hessian
      - pattern-regex: 'Kryo\b'
      - pattern-regex: 'HessianInput\b'
      - pattern-regex: '\.readClassAndObject\s*\('
      # SnakeYaml
      - pattern-regex: 'SnakeYaml\b'
      - pattern-regex: 'Yaml\(\)\.load\s*\('
      # Jackson 위험 설정
      - pattern-regex: 'activateDefaultTyping'
      - pattern-regex: 'enableDefaultTyping'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-502: Insecure Deserialization"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
