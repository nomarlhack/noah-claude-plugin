rules:
  - id: noah-python-deser-phase1-pattern
    severity: WARNING
    languages:
      - python
    message: |
      deserialization-scanner Phase 1 sink/source 패턴 매치 (Python 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'pickle\.loads\s*\('
      - pattern-regex: 'pickle\.load\s*\('
      - pattern-regex: 'cPickle\.loads\s*\('
      - pattern-regex: 'yaml\.load\s*\('
      - pattern-regex: 'jsonpickle\.decode\s*\('
      - pattern-regex: 'shelve\.open\s*\('
      - pattern-regex: 'dill\.loads?\s*\('
      - pattern-regex: 'marshal\.loads?\s*\('
      - pattern-regex: 'cloudpickle\.loads?\s*\('
      - pattern-regex: 'joblib\.load\s*\('
      - pattern-regex: 'torch\.load\s*\('
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-502: Insecure Deserialization"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
