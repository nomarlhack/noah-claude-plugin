rules:
  - id: noah-typescript-deser-phase1-pattern
    severity: WARNING
    languages:
      - typescript
    message: |
      deserialization-scanner Phase 1 sink/source 패턴 매치 (TypeScript 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'node-serialize'
      - pattern-regex: 'serialize\.unserialize\s*\('
      - pattern-regex: 'cryo\.parse\s*\('
      - pattern-regex: 'Cryo\.parse\s*\('
      - pattern-regex: 'yaml\.load\s*\('
      - pattern-regex: 'jsyaml\.load\s*\('
      - pattern-regex: 'flatted\.parse\s*\('
      - pattern-regex: 'devalue\.parse\s*\('
      - pattern-regex: 'vm\.runInNewContext\s*\('
      - pattern-regex: 'vm\.runInThisContext\s*\('
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-502: Insecure Deserialization"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
