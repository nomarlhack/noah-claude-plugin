rules:
  - id: noah-python-deser-taint
    severity: ERROR
    languages:
      - python
    mode: taint
    message: |
      Python에서 HTTP 입력이 pickle.loads/yaml.load(unsafe)/jsonpickle.decode에
      들어가면 Insecure Deserialization → RCE. yaml.safe_load, json.loads 사용.
    pattern-sources:
      - pattern: request.GET[$K]
      - pattern: request.POST[$K]
      - pattern: request.GET.get($K, ...)
      - pattern: request.POST.get($K, ...)
      - pattern: request.args[$K]
      - pattern: request.args.get($K, ...)
      - pattern: request.form[$K]
      - pattern: request.form.get($K, ...)
      - pattern: request.data
      - pattern: request.body
      - pattern: request.json
      - pattern: request.json[$K]
      - pattern: request.values[$K]
      - pattern: request.cookies[$K]
      - pattern: request.cookies.get($K, ...)
      # Tornado RequestHandler
      - pattern: self.get_argument($K)
      - pattern: self.get_argument($K, $DEFAULT)
      - pattern: self.get_body_argument($K)
      - pattern: self.get_query_argument($K)
      - pattern: self.request.arguments
      - pattern: self.request.body
      - pattern: self.request.body_arguments
      # Sanic
      - pattern: request.args.get($K)
      - pattern: request.args[$K]
      - pattern: request.form.get($K)
      - pattern: request.form[$K]
      - pattern: request.json
      - pattern: request.json.get($K)
      - pattern: await request.json()
      - pattern: request.raw_args[$K]
    pattern-sinks:
      - pattern: pickle.loads($X)
      - pattern: pickle.load($X)
      - pattern: cPickle.loads($X)
      - pattern: yaml.load($X)
      - pattern: yaml.load($X, ...)
      - pattern: jsonpickle.decode($X)
      - pattern: shelve.open($X)
      - pattern: dill.loads($X)
      - pattern: dill.load($X)
      # marshal — 임의 코드 실행 가능
      - pattern: marshal.loads($X)
      - pattern: marshal.load($X)
      # cloudpickle (ML 워크로드에서 자주 사용)
      - pattern: cloudpickle.loads($X)
      - pattern: cloudpickle.load($X)
      # joblib (scikit-learn 모델 로드)
      - pattern: joblib.load($X)
      # PyTorch 모델 — pickle 기반
      - pattern: torch.load($X)
      - pattern: torch.load($X, ...)
    pattern-sanitizers:
      - pattern: yaml.safe_load($X)
      - pattern: json.loads($X)
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-502: Insecure Deserialization"]
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      vulnerability_class: [Deserialization]
      owasp: ["A08:2021 Software and Data Integrity Failures"]
      technology: [python]
