rules:
  - id: noah-kotlin-deser-taint
    severity: ERROR
    languages:
      - kotlin
    mode: taint
    message: |
      Kotlin + Spring 컨트롤러 입력이 ObjectInputStream.readObject / XStream /
      SnakeYaml / Kryo에 전달되면 Insecure Deserialization → RCE.
      안전: Jackson ObjectMapper(기본설정), kotlinx.serialization, Kryo 화이트리스트.
    pattern-sources:
      - patterns:
          - pattern: $X
          - pattern-inside: |
              fun $METHOD(..., @RequestParam $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              fun $METHOD(..., @RequestParam(...) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              fun $METHOD(..., @RequestBody $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              fun $METHOD(..., @PathVariable $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              fun $METHOD(..., @PathVariable(...) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              fun $METHOD(..., @RequestHeader $X: $T, ...) { ... }

    pattern-sinks:
      # Java 표준 직렬화 (Kotlin에서도 사용)
      - pattern: $OIS.readObject()
      - pattern: ObjectInputStream($X).readObject()
      # XStream
      - pattern: $XS.fromXML($X)
      - pattern: XStream().fromXML($X)
      # SnakeYaml
      - pattern: Yaml().load($X)
      - pattern: $YAML.load($X)
      - pattern: $YAML.loadAll($X)
      # Kryo (클래스 등록 없는 경우 취약)
      - pattern: $KRYO.readObject($INPUT, ...)
      - pattern: $KRYO.readClassAndObject($INPUT)
      - pattern: Kryo().readObject($INPUT, ...)
      # Jackson — enableDefaultTyping / activateDefaultTyping 활성 시 위험
      - pattern: $MAPPER.readValue($X, Object::class.java)
      - pattern: $MAPPER.readValue($X, Any::class.java)
      # Hessian
      - pattern: HessianInput($X).readObject()
      - pattern: $HI.readObject()

    pattern-sanitizers:
      - pattern: $X.toInt()
      - pattern: $X.toLong()
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if ($WHITELIST.contains($X)) { ... }

    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-502: Deserialization of Untrusted Data"]
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      vulnerability_class: [Deserialization]
      owasp: ["A08:2021 Software and Data Integrity Failures"]
      technology: [kotlin, spring, xstream, kryo, snakeyaml]
