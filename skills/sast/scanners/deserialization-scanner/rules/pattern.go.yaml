rules:
  - id: noah-go-deser-phase1-pattern
    severity: WARNING
    languages:
      - go
    message: |
      deserialization-scanner Phase 1 sink/source 패턴 매치 (Go 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'gob\.NewDecoder\s*\('
      - pattern-regex: '\.Decode\s*\(&'
      - pattern-regex: 'yaml\.Unmarshal\s*\('
      - pattern-regex: 'yaml\.NewDecoder\s*\('
      - pattern-regex: 'xml\.Unmarshal\s*\('
      - pattern-regex: 'xml\.NewDecoder\s*\('
      - pattern-regex: 'msgpack\.Unmarshal\s*\('
      - pattern-regex: 'codec\.NewDecoder\s*\('
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-502: Insecure Deserialization"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
