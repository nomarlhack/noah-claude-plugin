rules:
  - id: noah-java-deser-taint
    severity: ERROR
    languages:
      - java
    mode: taint
    message: |
      Java Spring 컨트롤러 입력이 ObjectInputStream.readObject / XMLDecoder /
      XStream.fromXML에 들어가면 Insecure Deserialization → RCE.
      안전: 화이트리스트 ObjectInputFilter, JSON(Jackson) 사용.
    pattern-sources:
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @RequestParam $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @RequestBody $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @RequestHeader $X, ...) { ... }
      # JAX-RS / Jersey / Quarkus — REST resource method parameters
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @QueryParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @PathParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @FormParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @HeaderParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @MatrixParam($K) $X, ...) { ... }
      # Vert.x (reactive web)
      - pattern: $CTX.queryParam($K)
      - pattern: $CTX.queryParam($K).get(0)
      - pattern: $CTX.pathParam($K)
      - pattern: $CTX.body().asString()
      - pattern: $CTX.body().asJsonObject()
      - pattern: $REQ.getParam($K)
      - pattern: $REQ.params().get($K)
      # Struts2 / Struts1 — ActionContext / ActionForm
      - pattern: ActionContext.getContext().getParameters()
      - pattern: $FORM.get($K)
      - pattern: $SERVLET.getParameter($K)
      - pattern: $SERVLET.getParameterValues($K)
    pattern-sinks:
      # Java 표준 직렬화
      - pattern: $OIS.readObject()
      - pattern: new ObjectInputStream($X).readObject()
      - pattern: $DEC.readObject()
      # XStream
      - pattern: $XS.fromXML($X)
      - pattern: XStream().fromXML($X)
      # Apache Commons / Spring
      - pattern: SerializationUtils.deserialize($X)
      # Kryo (클래스 등록 없는 경우 취약)
      - pattern: $KRYO.readObject($INPUT, ...)
      - pattern: $KRYO.readClassAndObject($INPUT)
      # Hessian
      - pattern: new HessianInput($X).readObject()
      - pattern: $HI.readObject()
      # SnakeYaml
      - pattern: new Yaml().load($X)
      - pattern: $YAML.load($X)
      - pattern: $YAML.loadAll($X)
      # Fastjson — TypeNameHandling 활성 시 취약
      - pattern: JSON.parseObject($X, Object.class)
      - pattern: JSON.parse($X)
      - pattern: JSONObject.parseObject($X)
      # Jackson — enableDefaultTyping / activateDefaultTyping 활성 시 취약
      - pattern: $MAPPER.readValue($X, Object.class)
      - pattern: $MAPPER.readValue($X, Map.class)
    pattern-sanitizers:
      - pattern: $OIS.setObjectInputFilter($F)
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-502: Insecure Deserialization"]
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      vulnerability_class: [Deserialization]
      owasp: ["A08:2021 Software and Data Integrity Failures"]
      technology: [java, spring]
