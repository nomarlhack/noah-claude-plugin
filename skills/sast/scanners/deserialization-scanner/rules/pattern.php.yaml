rules:
  - id: noah-php-deser-phase1-pattern
    severity: WARNING
    languages:
      - php
    message: |
      deserialization-scanner Phase 1 sink/source 패턴 매치 (PHP 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'unserialize\s*\('
      - pattern-regex: 'maybe_unserialize\s*\('
      - pattern-regex: 'wddx_deserialize\s*\('
      - pattern-regex: 'igbinary_unserialize\s*\('
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-502: Insecure Deserialization"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
