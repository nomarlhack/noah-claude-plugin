rules:
  - id: noah-java-val-phase1-pattern
    severity: WARNING
    languages:
      - java
    message: |
      validation-logic-scanner Phase 1 sink/source 패턴 매치 (Java 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # Bean Validation (javax/jakarta)
      - pattern-regex: '@NotNull\b'
      - pattern-regex: '@NotBlank\b'
      - pattern-regex: '@NotEmpty\b'
      - pattern-regex: '@Size\b'
      - pattern-regex: '@Pattern\b'
      - pattern-regex: '@Min\b'
      - pattern-regex: '@Max\b'
      - pattern-regex: '@Email\b'
      - pattern-regex: '@Valid\b'
      - pattern-regex: '@Validated\b'
      - pattern-regex: 'BindingResult\b'
      - pattern-regex: '\.hasErrors\s*\('
      # Spring Validation
      - pattern-regex: 'ValidationPipe\b'
      - pattern-regex: 'forbidNonWhitelisted\b'
      - pattern-regex: '@IsOptional\b'
      - pattern-regex: '@IsNotEmpty\b'
      # == null 검사
      - pattern-regex: '==\s*null'
      - pattern-regex: '!=\s*null'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-20: Improper Input Validation"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
