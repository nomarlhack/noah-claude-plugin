rules:
  - id: noah-scala-val-phase1-pattern
    severity: WARNING
    languages:
      - scala
    message: |
      validation-logic-scanner Phase 1 sink/source 패턴 매치 (Scala 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # Bean Validation (JVM)
      - pattern-regex: '@NotNull\b'
      - pattern-regex: '@NotBlank\b'
      - pattern-regex: '@Valid\b'
      # Play Framework
      - pattern-regex: 'Form\[_\]'
      - pattern-regex: '\.bindFromRequest\s*\('
      - pattern-regex: '\.verifying\s*\('
      # Cats Validated
      - pattern-regex: 'Validated\b'
      - pattern-regex: 'NonEmptyList\b'
      - pattern-regex: '==\s*null\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-20: Improper Input Validation"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
