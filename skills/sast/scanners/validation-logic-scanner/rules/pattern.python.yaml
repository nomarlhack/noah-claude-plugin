rules:
  - id: noah-python-val-phase1-pattern
    severity: WARNING
    languages:
      - python
    message: |
      validation-logic-scanner Phase 1 sink/source 패턴 매치 (Python 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # Pydantic
      - pattern-regex: 'BaseModel\b'
      - pattern-regex: '@validator\b'
      - pattern-regex: '@field_validator\b'
      - pattern-regex: 'model_validate\s*\('
      # Marshmallow
      - pattern-regex: 'Schema\b'
      - pattern-regex: '\.load\s*\('
      - pattern-regex: '\.loads\s*\('
      - pattern-regex: 'validates\s*\('
      # WTForms
      - pattern-regex: 'DataRequired\b'
      - pattern-regex: 'InputRequired\b'
      - pattern-regex: 'validators\.\w+'
      # Django forms
      - pattern-regex: 'is_valid\s*\('
      - pattern-regex: 'cleaned_data\b'
      # 기본 검사
      - pattern-regex: 'is\s+None\b'
      - pattern-regex: 'is\s+not\s+None\b'
      - pattern-regex: '==\s*None\b'
      - pattern-regex: '==\s*""\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-20: Improper Input Validation"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
