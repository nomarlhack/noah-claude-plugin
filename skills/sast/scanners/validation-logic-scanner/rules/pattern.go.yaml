rules:
  - id: noah-go-val-phase1-pattern
    severity: WARNING
    languages:
      - go
    message: |
      validation-logic-scanner Phase 1 sink/source 패턴 매치 (Go 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # go-playground/validator
      - pattern-regex: 'validate\.Struct\s*\('
      - pattern-regex: 'validate\.Var\s*\('
      - pattern-regex: '`validate:"[^"]*"`'
      # ozzo-validation
      - pattern-regex: 'validation\.Validate\s*\('
      - pattern-regex: 'validation\.Required\b'
      # 기본 검사
      - pattern-regex: '==\s*nil\b'
      - pattern-regex: '!=\s*nil\b'
      - pattern-regex: '==\s*""\b'
      - pattern-regex: 'len\s*\(\s*\w+\s*\)\s*==\s*0'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-20: Improper Input Validation"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
