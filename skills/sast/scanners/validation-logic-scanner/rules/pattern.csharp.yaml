rules:
  - id: noah-csharp-val-phase1-pattern
    severity: WARNING
    languages:
      - csharp
    message: |
      validation-logic-scanner Phase 1 sink/source 패턴 매치 (C# 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # Data Annotations
      - pattern-regex: '\[Required\]'
      - pattern-regex: '\[Range\b'
      - pattern-regex: '\[StringLength\b'
      - pattern-regex: '\[RegularExpression\b'
      - pattern-regex: '\[EmailAddress\]'
      - pattern-regex: '\[MaxLength\b'
      - pattern-regex: '\[MinLength\b'
      # ModelState
      - pattern-regex: 'ModelState\.IsValid\b'
      - pattern-regex: 'ModelState\.AddModelError\b'
      # FluentValidation
      - pattern-regex: 'AbstractValidator\b'
      - pattern-regex: '\.RuleFor\s*\('
      - pattern-regex: '\.NotEmpty\s*\('
      - pattern-regex: '\.NotNull\s*\('
      # null 검사
      - pattern-regex: '==\s*null\b'
      - pattern-regex: '!=\s*null\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-20: Improper Input Validation"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
