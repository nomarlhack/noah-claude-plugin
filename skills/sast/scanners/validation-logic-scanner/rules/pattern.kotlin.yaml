rules:
  - id: noah-kotlin-val-phase1-pattern
    severity: WARNING
    languages:
      - kotlin
    message: |
      validation-logic-scanner Phase 1 sink/source 패턴 매치 (Kotlin 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # Bean Validation
      - pattern-regex: '@NotNull\b'
      - pattern-regex: '@NotBlank\b'
      - pattern-regex: '@NotEmpty\b'
      - pattern-regex: '@Size\b'
      - pattern-regex: '@Pattern\b'
      - pattern-regex: '@Valid\b'
      - pattern-regex: '@Validated\b'
      # Kotlin 관용구
      - pattern-regex: '\.isNullOrBlank\s*\('
      - pattern-regex: '\.isNullOrEmpty\s*\('
      - pattern-regex: 'requireNotNull\s*\('
      - pattern-regex: 'checkNotNull\s*\('
      - pattern-regex: '==\s*null'
      - pattern-regex: '!=\s*null'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-20: Improper Input Validation"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
