rules:
  - id: noah-ruby-val-phase1-pattern
    severity: WARNING
    languages:
      - ruby
    message: |
      validation-logic-scanner Phase 1 sink/source 패턴 매치 (Ruby 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: '==\s*null'
      - pattern-regex: '!=\s*null'
      - pattern-regex: '==\s*undefined'
      - pattern-regex: '!=\s*undefined'
      - pattern-regex: '==\s*false'
      - pattern-regex: '==\s*true'
      - pattern-regex: '==\s*0\b'
      - pattern-regex: '==\s*'''''
      - pattern-regex: '==\s*""'
      - pattern-regex: 'Joi\.'
      - pattern-regex: '\.validate\s*\('
      - pattern-regex: 'ValidationPipe'
      - pattern-regex: '@Valid\b'
      - pattern-regex: 'express-validator'
      - pattern-regex: 'class-validator'
      - pattern-regex: 'checkSchema'
      - pattern-regex: 'ajv'
      - pattern-regex: 'checkValidity'
      - pattern-regex: 'setCustomValidity'
      - pattern-regex: 'additionalProperties'
      - pattern-regex: 'stripUnknown'
      - pattern-regex: 'allowUnknown'
      - pattern-regex: 'forbidNonWhitelisted'
      - pattern-regex: '@IsOptional'
      - pattern-regex: '@IsNotEmpty'
      - pattern-regex: 'typeof\s+\w+'
      - pattern-regex: 'instanceof\s+'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-20: Validation Logic Flaw"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
