rules:
  - id: noah-ruby-val-phase1-pattern
    severity: WARNING
    languages:
      - ruby
    message: |
      validation-logic-scanner Phase 1 sink/source 패턴 매치 (Ruby 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # ActiveModel / Rails 검증
      - pattern-regex: 'validates\s+:'
      - pattern-regex: 'validates!\s+:'
      - pattern-regex: 'validate\s+:'
      - pattern-regex: 'validates_presence_of\b'
      - pattern-regex: 'validates_length_of\b'
      - pattern-regex: 'validates_format_of\b'
      - pattern-regex: 'ActiveModel::Validator\b'
      # dry-validation / dry-schema
      - pattern-regex: 'Dry::Validation\b'
      - pattern-regex: 'Dry::Schema\b'
      # 기본 검사
      - pattern-regex: '\.nil\?\s*\('
      - pattern-regex: '\.blank\?\s*\('
      - pattern-regex: '\.present\?\s*\('
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-20: Improper Input Validation"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
