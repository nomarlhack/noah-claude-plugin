rules:
  - id: noah-typescript-val-phase1-pattern
    severity: WARNING
    languages:
      - typescript
    message: |
      validation-logic-scanner Phase 1 sink/source 패턴 매치 (TypeScript 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'class-validator\b'
      - pattern-regex: 'class-transformer\b'
      - pattern-regex: 'ValidationPipe\b'
      - pattern-regex: 'forbidNonWhitelisted\b'
      - pattern-regex: '@IsOptional\b'
      - pattern-regex: '@IsNotEmpty\b'
      - pattern-regex: '@IsString\b'
      - pattern-regex: '@IsNumber\b'
      - pattern-regex: '@IsEmail\b'
      - pattern-regex: 'zod\b'
      - pattern-regex: 'Joi\.'
      - pattern-regex: '==\s*null'
      - pattern-regex: '==\s*undefined'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-20: Improper Input Validation"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
