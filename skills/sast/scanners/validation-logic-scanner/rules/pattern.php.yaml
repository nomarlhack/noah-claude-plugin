rules:
  - id: noah-php-val-phase1-pattern
    severity: WARNING
    languages:
      - php
    message: |
      validation-logic-scanner Phase 1 sink/source 패턴 매치 (PHP 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # Laravel 검증
      - pattern-regex: '\$request->validate\s*\('
      - pattern-regex: 'Validator::make\s*\('
      - pattern-regex: 'FormRequest\b'
      - pattern-regex: '->validated\s*\('
      # Symfony 검증
      - pattern-regex: 'Assert\\\\NotBlank\b'
      - pattern-regex: 'Assert\\\\NotNull\b'
      - pattern-regex: 'Assert\\\\Length\b'
      - pattern-regex: '@Assert\\'
      # filter_var
      - pattern-regex: 'filter_var\s*\('
      - pattern-regex: 'filter_input\s*\('
      - pattern-regex: 'FILTER_VALIDATE_\w+'
      # 기본 검사
      - pattern-regex: '===\s*null\b'
      - pattern-regex: '===\s*""\b'
      - pattern-regex: 'empty\s*\('
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-20: Improper Input Validation"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
