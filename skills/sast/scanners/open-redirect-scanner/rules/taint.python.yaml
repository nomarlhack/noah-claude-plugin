rules:
  - id: noah-python-open-redirect-taint
    severity: ERROR
    languages:
      - python
    mode: taint
    message: |
      Python에서 HTTP 입력이 redirect()/HttpResponseRedirect에 직접 들어가면
      Open Redirect. 안전: url_has_allowed_host_and_scheme (Django),
      상대 경로 강제 또는 호스트 화이트리스트.
    pattern-sources:
      - pattern: request.GET[$K]
      - pattern: request.POST[$K]
      - pattern: request.args.get($K, ...)
      - pattern: request.form.get($K, ...)
      - pattern: request.values[$K]
      # Tornado RequestHandler
      - pattern: self.get_argument($K)
      - pattern: self.get_argument($K, $DEFAULT)
      - pattern: self.get_body_argument($K)
      - pattern: self.get_query_argument($K)
      - pattern: self.request.arguments
      - pattern: self.request.body
      - pattern: self.request.body_arguments
      # Sanic
      - pattern: request.args.get($K)
      - pattern: request.args[$K]
      - pattern: request.form.get($K)
      - pattern: request.form[$K]
      - pattern: request.json
      - pattern: request.json.get($K)
      - pattern: await request.json()
      - pattern: request.raw_args[$K]
    pattern-sinks:
      # Django
      - pattern: redirect($X)
      - pattern: redirect($X, ...)
      - pattern: HttpResponseRedirect($X)
      - pattern: HttpResponsePermanentRedirect($X)
      # Flask
      - pattern: flask.redirect($X)
      # FastAPI / Starlette
      - pattern: RedirectResponse($X)
      - pattern: RedirectResponse(url=$X)
      # Tornado
      - pattern: self.redirect($X)
      - pattern: self.redirect($X, ...)
      # Sanic
      - pattern: response.redirect($X)
    pattern-sanitizers:
      - pattern: url_has_allowed_host_and_scheme($X, ...)
      - pattern: is_safe_url($X, ...)
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if $X.startswith("/"):
                  ...
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-601: Open Redirect"]
      confidence: HIGH
      likelihood: MEDIUM
      impact: MEDIUM
      vulnerability_class: [Open Redirect]
      owasp: ["A01:2021 Broken Access Control"]
      technology: [python, django, flask, fastapi]
