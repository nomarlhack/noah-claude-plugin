rules:
  - id: noah-php-open-redirect-taint
    severity: ERROR
    languages:
      - php
    mode: taint
    message: |
      PHP $_GET/$_POST/$_REQUEST 값이 header("Location: ...")에 직접 들어가면
      Open Redirect (+ CRLF Injection 결합 가능). 안전: 상대 경로 강제, 화이트리스트.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_GET[...];
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_POST[...];
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_REQUEST[...];
      # Laravel (Illuminate\Http\Request)
      - pattern: $REQ->input($K)
      - pattern: $REQ->input($K, $DEFAULT)
      - pattern: $REQ->get($K)
      - pattern: $REQ->get($K, $DEFAULT)
      - pattern: $REQ->query($K)
      - pattern: $REQ->query($K, $DEFAULT)
      - pattern: $REQ->post($K)
      - pattern: $REQ->post($K, $DEFAULT)
      - pattern: $REQ->all()
      - pattern: $REQ->only($KEYS)
      - pattern: $REQ->except($KEYS)
      - pattern: $REQ->json($K)
      - pattern: $REQ->json($K, $DEFAULT)
      - pattern: $REQ->header($K)
      - pattern: $REQ->cookie($K)
      - pattern: request()->input($K)
      - pattern: request()->get($K)
      # Symfony (HttpFoundation\Request)
      - pattern: $REQ->query->get($K)
      - pattern: $REQ->request->get($K)
      - pattern: $REQ->attributes->get($K)
      - pattern: $REQ->headers->get($K)
      - pattern: $REQ->cookies->get($K)
      - pattern: $REQ->getContent()
      # CodeIgniter 3/4
      - pattern: $CI->input->get($K)
      - pattern: $CI->input->post($K)
      - pattern: $CI->input->get_post($K)
      - pattern: $CI->input->server($K)
      - pattern: $this->input->get($K)
      - pattern: $this->input->post($K)
      - pattern: $this->request->getVar($K)
      - pattern: $this->request->getGet($K)
      - pattern: $this->request->getPost($K)
    pattern-sinks:
      - pattern: 'header($X);'
      - pattern: 'header("Location: " . $X);'
    pattern-sanitizers:
      - pattern: filter_var($X, FILTER_VALIDATE_URL)
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if (in_array($X, $WHITELIST)) { ... }
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-601: Open Redirect"]
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: MEDIUM
      vulnerability_class: [Open Redirect]
      owasp: ["A01:2021 Broken Access Control"]
      technology: [php]
