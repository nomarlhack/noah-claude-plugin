rules:
  - id: noah-javascript-hosthdr-phase1-pattern
    severity: WARNING
    languages:
      - javascript
    message: |
      host-header-scanner Phase 1 sink/source 패턴 매치 (JavaScript 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'req\.headers\.host'
      - pattern-regex: 'req\.hostname'
      - pattern-regex: 'req\.get(''host'')'
      - pattern-regex: 'request\.get_host\s*\('
      - pattern-regex: 'HTTP_HOST'
      - pattern-regex: 'request\.build_absolute_uri\s*\('
      - pattern-regex: 'request\.host'
      - pattern-regex: 'request\.getServerName\s*\('
      - pattern-regex: 'X-Forwarded-For'
      - pattern-regex: 'X-Real-IP'
      - pattern-regex: 'X-Forwarded-Host'
      - pattern-regex: 'remote_ip'
      - pattern-regex: 'remote_addr'
      - pattern-regex: 'REMOTE_ADDR'
      - pattern-regex: 'getHeader\s*\('
      - pattern-regex: 'request\.remoteAddr'
      - pattern-regex: 'X-Original-Forwarded-For'
      - pattern-regex: 'HttpHeaders\.HOST'
      - pattern-regex: '@RequestHeader\([^)]*([Hh]ost|HOST|Forwarded)'
      - pattern-regex: 'getFirst\([^)]*([Hh]ost|HOST|Forwarded)'
      - pattern-regex: 'ServletUriComponentsBuilder'
      - pattern-regex: 'fromCurrentRequest'
      - pattern-regex: 'fromCurrentContextPath'
      - pattern-regex: 'fromHttpRequest'
      - pattern-regex: 'X-Host'
      - pattern-regex: 'X-Original-Host'
      - pattern-regex: 'X-Forwarded-Server'
      - pattern-regex: 'X-Original-URL'
      - pattern-regex: 'X-Rewrite-URL'
      - pattern-regex: 'True-Client-IP'
      - pattern-regex: 'CF-Connecting-IP'
      - pattern-regex: 'X-Client-IP'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-20: Host Header Injection"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
