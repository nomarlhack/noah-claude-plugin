rules:
  - id: noah-javascript-log-injection-taint
    severity: WARNING
    languages:
      - javascript
      - typescript
    mode: taint
    message: |
      사용자 입력이 개행 제거 없이 로그 함수에 직접 전달되면 Log Injection.
      CRLF 삽입으로 로그 위조 또는 민감 정보(비밀번호/토큰) 로그 노출 가능.
      안전: 개행 제거 후 로깅, 구조화 로깅으로 값 분리.
    pattern-sources:
      - pattern: req.body
      - pattern: req.body.$K
      - pattern: req.query
      - pattern: req.query.$K
      - pattern: req.params
      - pattern: req.params.$K
      - pattern: req.headers[$K]
      - pattern: searchParams.get($K)
      - pattern: $REQ.nextUrl.searchParams.get($K)
      - pattern: request.body
      - pattern: request.query[$K]

      # NestJS — decorator-based parameter injection
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Param($K) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Param() $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Query($K) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Query() $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Body($K) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Body() $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Headers($K) $X: $T, ...) { ... }
      # Hapi.js
      - pattern: request.params.$K
      - pattern: request.payload
      - pattern: request.payload.$K
      - pattern: request.query.$K
    pattern-sinks:
      # console
      - pattern: console.log($X)
      - pattern: console.info($X)
      - pattern: console.error($X)
      - pattern: console.warn($X)
      - pattern: console.debug($X)
      # winston
      - pattern: $LOGGER.info($X)
      - pattern: $LOGGER.error($X)
      - pattern: $LOGGER.warn($X)
      - pattern: $LOGGER.debug($X)
      - pattern: logger.info($X)
      - pattern: logger.error($X)
      - pattern: logger.warn($X)
      - pattern: logger.debug($X)
      # pino
      - pattern: $PINO.info($X)
      - pattern: $PINO.error($X)
      # bunyan
      - pattern: $LOG.info($X)
      - pattern: $LOG.error($X)

    pattern-sanitizers:
      - pattern: $X.replace(/[\r\n]/g, "")
      - pattern: $X.replace(/\r\n|\r|\n/g, "")
      - pattern: encodeURIComponent($X)
      - patterns:
          - pattern: $X
          - pattern-inside: |
              const $S = $X.replace(/[\r\n]/g, "")

    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-117: Improper Output Neutralization for Logs"
        - "CWE-532: Insertion of Sensitive Information into Log File"
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: MEDIUM
      vulnerability_class:
        - Log Injection
      owasp:
        - "A09:2021 Security Logging and Monitoring Failures"
      technology:
        - nodejs
        - express
        - winston
        - pino
        - bunyan
