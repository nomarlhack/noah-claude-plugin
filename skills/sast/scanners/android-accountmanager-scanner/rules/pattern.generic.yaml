rules:
  - id: noah-android-accountmanager-phase1-pattern
    severity: WARNING
    languages:
      - generic
    message: |
      android-accountmanager-scanner Phase 1 패턴 매치 (언어 무관).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(caller 검증 여부, 토큰 전달 경로)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'peekAuthToken\b'
      - pattern-regex: 'blockingGetAuthToken\b'
      - pattern-regex: 'AbstractAccountAuthenticator\b'
      - pattern-regex: 'KEY_AUTHTOKEN\b'
      - pattern-regex: 'AccountManager\.get\b'
      - pattern-regex: 'getAuthToken\b'
      - pattern-regex: 'Binder\.getCallingUid\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-287: Improper Authentication"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
