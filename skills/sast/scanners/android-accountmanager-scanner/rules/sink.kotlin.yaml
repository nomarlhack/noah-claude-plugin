rules:
  - id: noah-kotlin-android-accountmanager-no-caller-check-sink
    severity: ERROR
    languages:
      - kotlin
    message: |
      AbstractAccountAuthenticator.getAuthToken() 구현에서 Binder.getCallingUid() /
      response.getCallerUid() 호출이 없음 — caller 신원 검증 없이 SSO 토큰 반환.
      GET_ACCOUNTS 권한을 가진 임의 앱이 토큰 요청 가능.
      안전: 메서드 진입부에서 callerUid 확인 + 허용 목록 비교.
    pattern-either:
      # getAuthToken override에서 Binder.getCallingUid 없이 KEY_AUTHTOKEN 삽입
      - patterns:
          - pattern: $BUNDLE.putString(AccountManager.KEY_AUTHTOKEN, $TOKEN)
          - pattern-not-inside: |
              override fun getAuthToken(...) {
                ...
                Binder.getCallingUid()
                ...
              }
          - pattern-inside: |
              override fun getAuthToken(...) { ... }
      # peekAuthToken 결과를 Intent/broadcast로 외부 전달
      - patterns:
          - pattern: $INTENT.putExtra($K, $AM.peekAuthToken($ACCOUNT, $TYPE))
      - patterns:
          - pattern: sendBroadcast($INTENT)
          - pattern-inside: |
              val $TOKEN = $AM.peekAuthToken($ACCOUNT, $TYPE)
              ...
              $INTENT.putExtra($K, $TOKEN)
              ...
      # userdata에 토큰 저장
      - patterns:
          - pattern: $AM.setUserData($ACCOUNT, $KEY, $VALUE)
          - pattern-not-inside: |
              if ($ALLOWED.contains(Binder.getCallingUid())) { ... }

    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-287: Improper Authentication"]
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
      vulnerability_class: [SSO Token Exposure, Missing Caller Verification]
      owasp: ["A07:2021 Identification and Authentication Failures"]
      technology: [android, kotlin, accountmanager]

  - id: noah-kotlin-android-accountmanager-insecure-userdata-sink
    severity: WARNING
    languages:
      - kotlin
    message: |
      addAccountExplicitly()의 userdata 번들에 토큰/비밀번호 등 민감 데이터 저장.
      GET_ACCOUNTS 권한을 가진 앱이 getUserData()로 읽기 가능.
      안전: userdata에 민감 정보 저장 금지, 암호화된 내부 저장소 사용.
    pattern-either:
      # userdata 번들에 토큰 관련 키 저장
      - pattern-regex: 'addAccountExplicitly\s*\([^,]+,[^,]+,\s*Bundle\(\)'
      - patterns:
          - pattern: $USERDATA.putString($K, $V)
          - pattern-inside: |
              $AM.addAccountExplicitly($ACCOUNT, $PW, $USERDATA)

    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-312: Cleartext Storage of Sensitive Information"]
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: MEDIUM
      vulnerability_class: [Insecure Storage, AccountManager]
      owasp: ["A02:2021 Cryptographic Failures"]
      technology: [android, kotlin, accountmanager]
