rules:
  - id: noah-python-upload-phase1-pattern
    severity: WARNING
    languages:
      - python
    message: |
      file-upload-scanner Phase 1 sink/source 패턴 매치 (Python 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'request\.files\b'
      - pattern-regex: 'request\.FILES\b'
      - pattern-regex: 'UploadFile\b'
      - pattern-regex: 'FileField\b'
      - pattern-regex: 'ImageField\b'
      - pattern-regex: '\.filename\b'
      - pattern-regex: 'secure_filename\s*\('
      - pattern-regex: '\.save\s*\('
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-434: Unrestricted File Upload"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
