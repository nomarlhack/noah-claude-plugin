rules:
  - id: noah-go-upload-phase1-pattern
    severity: WARNING
    languages:
      - go
    message: |
      file-upload-scanner Phase 1 sink/source 패턴 매치 (Go 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'FormFile\s*\('
      - pattern-regex: '\.Filename\b'
      - pattern-regex: 'multipart\.FileHeader\b'
      - pattern-regex: 'c\.FormFile\s*\('
      - pattern-regex: 'r\.FormFile\s*\('
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-434: Unrestricted File Upload"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
