rules:
  - id: noah-kotlin-upload-phase1-pattern
    severity: WARNING
    languages:
      - kotlin
    message: |
      file-upload-scanner Phase 1 sink/source 패턴 매치 (Kotlin 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'MultipartFile\b'
      - pattern-regex: '@RequestPart\b'
      - pattern-regex: 'originalFilename\b'
      - pattern-regex: '\.transferTo\s*\('
      - pattern-regex: 'MultipartHttpServletRequest\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-434: Unrestricted File Upload"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
