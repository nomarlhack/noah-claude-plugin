rules:
  - id: noah-php-upload-phase1-pattern
    severity: WARNING
    languages:
      - php
    message: |
      file-upload-scanner Phase 1 sink/source 패턴 매치 (PHP 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: '\$_FILES\b'
      - pattern-regex: 'move_uploaded_file\s*\('
      - pattern-regex: 'getClientOriginalName\s*\('
      - pattern-regex: 'getClientOriginalExtension\s*\('
      - pattern-regex: 'is_uploaded_file\s*\('
      - pattern-regex: 'PATHINFO_EXTENSION\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-434: Unrestricted File Upload"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
