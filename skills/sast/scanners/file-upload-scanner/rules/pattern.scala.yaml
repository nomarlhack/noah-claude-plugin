rules:
  - id: noah-scala-upload-phase1-pattern
    severity: WARNING
    languages:
      - scala
    message: |
      file-upload-scanner Phase 1 sink/source 패턴 매치 (Scala 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'MultipartFile\b'
      - pattern-regex: 'multipart/form-data'
      - pattern-regex: 'getOriginalFilename\s*\('
      - pattern-regex: 'MultipartBody\b'
      - pattern-regex: 'BodyPart\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-434: Unrestricted File Upload"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
