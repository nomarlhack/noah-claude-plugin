rules:
  - id: noah-ruby-upload-phase1-pattern
    severity: WARNING
    languages:
      - ruby
    message: |
      file-upload-scanner Phase 1 sink/source 패턴 매치 (Ruby 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'original_filename\b'
      - pattern-regex: 'ActiveStorage\b'
      - pattern-regex: 'CarrierWave\b'
      - pattern-regex: 'Shrine\b'
      - pattern-regex: 'Paperclip\b'
      - pattern-regex: 'content_type\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-434: Unrestricted File Upload"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
