rules:
  - id: noah-csharp-upload-phase1-pattern
    severity: WARNING
    languages:
      - csharp
    message: |
      file-upload-scanner Phase 1 sink/source 패턴 매치 (C# 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'IFormFile\b'
      - pattern-regex: '\.FileName\b'
      - pattern-regex: '\.ContentType\b'
      - pattern-regex: 'CopyToAsync\s*\('
      - pattern-regex: 'HttpPostedFileBase\b'
      - pattern-regex: 'Request\.Form\.Files\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-434: Unrestricted File Upload"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
