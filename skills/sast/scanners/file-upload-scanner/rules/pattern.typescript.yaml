rules:
  - id: noah-typescript-upload-phase1-pattern
    severity: WARNING
    languages:
      - typescript
    message: |
      file-upload-scanner Phase 1 sink/source 패턴 매치 (TypeScript 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'multer\b'
      - pattern-regex: 'busboy\b'
      - pattern-regex: 'express-fileupload'
      - pattern-regex: '@UploadedFile\b'
      - pattern-regex: '@UploadedFiles\b'
      - pattern-regex: 'Express\.Multer\.File\b'
      - pattern-regex: '\.originalname\b'
      - pattern-regex: 'req\.file\b'
      - pattern-regex: 'req\.files\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-434: Unrestricted File Upload"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
