rules:
  - id: noah-javascript-dom-xss-taint
    severity: ERROR
    languages:
      - javascript
      - typescript
    mode: taint
    message: |
      클라이언트에서 location.hash/search/href, document.referrer, window.name,
      postMessage data가 innerHTML/document.write/eval/setTimeout(string)에 들어가면
      DOM-based XSS. 안전: textContent 사용, DOMPurify.sanitize.
    pattern-sources:
      - pattern: location.hash
      - pattern: location.search
      - pattern: location.href
      - pattern: document.location.hash
      - pattern: document.location.search
      - pattern: document.URL
      - pattern: document.referrer
      - pattern: window.name
      - pattern: localStorage.getItem($K)
      - pattern: sessionStorage.getItem($K)
      - patterns:
          - pattern: $E.data
          - pattern-inside: |
              window.addEventListener("message", function($E) { ... })
      - pattern: new URLSearchParams(location.search).get($K)
      # document.cookie (클라이언트 저장값)
      - pattern: document.cookie
      # URLSearchParams 다양한 형태
      - pattern: URLSearchParams.get($K)
      - pattern: new URLSearchParams($S).get($K)
      - pattern: new URLSearchParams(location.hash.substring(1)).get($K)
      # postMessage 다양한 이벤트 리스너 패턴
      - pattern: $E.data
      - pattern: event.data
      - pattern: e.data
      - pattern: msg.data
      # document.documentURI
      - pattern: document.documentURI
      # opener (클릭재킹/탭냅핑)
      - pattern: opener.location.href
      - pattern: window.opener.location.href
      # NestJS — decorator-based parameter injection
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Param($K) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Param() $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Query($K) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Query() $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Body($K) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Body() $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Headers($K) $X: $T, ...) { ... }
      # Hapi.js
      - pattern: request.params.$K
      - pattern: request.payload
      - pattern: request.payload.$K
      - pattern: request.query.$K
    pattern-sinks:
      - pattern: $EL.innerHTML = $X
      - pattern: $EL.outerHTML = $X
      - pattern: document.write($X)
      - pattern: document.writeln($X)
      - pattern: $EL.insertAdjacentHTML($POS, $X)
      - pattern: eval($X)
      - pattern: setTimeout($X, ...)
      - pattern: setInterval($X, ...)
      - pattern: new Function($X)
      - pattern: $($SEL).html($X)
      - pattern: $EL.setAttribute("src", $X)
      # URL-based navigation sink (DOM-based XSS via URL)
      - pattern: $E.srcdoc = $X
      - pattern: location.href = $X
      - pattern: location.assign($X)
      - pattern: location.replace($X)
      - pattern: window.location.href = $X
      - pattern: window.location.assign($X)
      # DOM fragment
      - pattern: $RANGE.createContextualFragment($X)
      - pattern: document.createRange().createContextualFragment($X)
      # script/link element injection
      - pattern: $E.src = $X
      - pattern: $E.href = $X
      - pattern: $E.action = $X
    pattern-sanitizers:
      - pattern: DOMPurify.sanitize($X, ...)
      - pattern: DOMPurify.sanitize($X)
      - pattern: encodeURIComponent($X)
      - pattern: $EL.textContent = $X
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-79: DOM-based XSS"]
      confidence: HIGH
      likelihood: HIGH
      impact: MEDIUM
      vulnerability_class: [XSS]
      owasp: ["A03:2021 Injection"]
      technology: [javascript, typescript, browser]
