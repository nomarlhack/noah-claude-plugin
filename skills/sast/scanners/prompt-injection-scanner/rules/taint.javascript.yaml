rules:
  - id: noah-javascript-prompt-injection-taint
    severity: ERROR
    languages:
      - javascript
      - typescript
    mode: taint
    message: |
      Node.js에서 req.* 입력이 LLM SDK 호출(openai.chat.completions.create /
      anthropic.messages.create / langchain invoke)의 prompt/messages에 직접
      결합되면 Prompt Injection. 안전: 시스템/사용자 분리, 입력 검증. (LLM01:2025)
    pattern-sources:
      - pattern: req.body
      - pattern: req.body.$X
      - pattern: req.query
      - pattern: req.query.$X
      - pattern: req.params
      # Next.js App Router
      - pattern: searchParams.get($K)
      - pattern: params[$K]
      - pattern: $REQ.nextUrl.searchParams.get($K)
      - pattern: $REQ.nextUrl.searchParams.get($K, ...)
      # Fastify
      - pattern: request.query[$K]
      - pattern: request.body
    pattern-sinks:
      # Vercel AI SDK
      - pattern: "generateText({..., prompt: $X, ...})"
      - pattern: "generateText({..., messages: $X, ...})"
      - pattern: "streamText({..., prompt: $X, ...})"
      - pattern: "streamText({..., messages: $X, ...})"
      - pattern: "generateObject({..., prompt: $X, ...})"
      # @langchain/anthropic, @langchain/openai
      - pattern: $MODEL.invoke($X)
      - pattern: $MODEL.stream($X)
      - pattern: openai.chat.completions.create(...)
      - pattern: $CLIENT.chat.completions.create(...)
      - pattern: $CLIENT.completions.create(...)
      - pattern: $CLIENT.messages.create(...)
      - pattern: anthropic.messages.create(...)
      - pattern: $MODEL.generateContent($X)
      - pattern: $LLM.invoke($X)
      - pattern: $CHAIN.invoke($X)
      - pattern: $CHAIN.call($X)
    pattern-sanitizers: []
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-1427: Prompt Injection"]
      confidence: MEDIUM
      likelihood: HIGH
      impact: HIGH
      vulnerability_class: [Prompt Injection]
      owasp: ["LLM01:2025 Prompt Injection"]
      technology: [nodejs, openai, anthropic, langchain]
