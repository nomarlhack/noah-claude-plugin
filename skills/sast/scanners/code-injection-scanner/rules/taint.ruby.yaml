rules:
  - id: noah-ruby-codeinj-taint
    severity: ERROR
    languages:
      - ruby
    mode: taint
    message: |
      Ruby에서 params/request.params가 eval/instance_eval/class_eval/binding.eval에
      직접 전달되면 Code Injection → RCE.
      안전: 사용자 입력을 코드 실행 함수에 전달하지 말 것.
    pattern-sources:
      - pattern: params[$K]
      - pattern: params.require($K)
      - pattern: request.params[$K]
      - pattern: request.query_string
      - pattern: cookies[$K]

    pattern-sinks:
      # Kernel#eval
      - pattern: eval($X)
      - pattern: eval($X, ...)
      - pattern: Kernel.eval($X)
      - pattern: Kernel.eval($X, ...)
      # Object#instance_eval / class_eval / module_eval
      - pattern: $OBJ.instance_eval($X)
      - pattern: $OBJ.instance_eval($X, ...)
      - pattern: $OBJ.class_eval($X)
      - pattern: $OBJ.class_eval($X, ...)
      - pattern: $OBJ.module_eval($X)
      - pattern: $OBJ.module_eval($X, ...)
      # Binding#eval
      - pattern: binding.eval($X)
      - pattern: $BIND.eval($X)
      # Proc / Lambda from string
      - pattern: "Proc.new { eval($X) }"
      # load / require with user input
      - pattern: load($X)
      - pattern: require($X)
      - pattern: require_relative($X)
      # RubyVM::InstructionSequence
      - pattern: RubyVM::InstructionSequence.compile($X)

    pattern-sanitizers:
      - pattern: $X.to_i
      - pattern: Integer($X)
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if $WHITELIST.include?($X)
                ...
              end

    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-94: Improper Control of Generation of Code (Code Injection)"]
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      vulnerability_class: [Code Injection]
      owasp: ["A03:2021 Injection"]
      technology: [ruby, rails, sinatra]
