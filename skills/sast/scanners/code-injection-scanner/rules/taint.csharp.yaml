rules:
  - id: noah-csharp-codeinj-taint
    severity: ERROR
    languages:
      - csharp
    mode: taint
    message: |
      C#에서 사용자 입력이 Roslyn CSharpScript / CodeDom 컴파일러에 직접 전달되면
      Code Injection → RCE.
      안전: 사용자 입력을 코드 소스가 아닌 데이터(변수 바인딩)로만 전달.
    pattern-sources:
      - patterns:
          - pattern: $X
          - pattern-inside: |
              public $T $METHOD([FromQuery] $X $NAME, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              public $T $METHOD([FromBody] $X $NAME, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              public $T $METHOD([FromRoute] $X $NAME, ...) { ... }
      - pattern: Request.Query[$K]
      - pattern: Request.Form[$K]
      - pattern: HttpContext.Request.Query[$K]

    pattern-sinks:
      # Roslyn CSharpScript
      - pattern: CSharpScript.EvaluateAsync($X, ...)
      - pattern: CSharpScript.RunAsync($X, ...)
      - pattern: CSharpScript.Create($X, ...)
      # CodeDom
      - pattern: new CSharpCodeProvider().CompileAssemblyFromSource($PARAMS, $X)
      - pattern: CodeDomProvider.CreateProvider("CSharp").CompileAssemblyFromSource($P, $X)
      # Roslyn Compilation
      - pattern: CSharpCompilation.Create($N, new[]{CSharpSyntaxTree.ParseText($X)})
      - pattern: CSharpSyntaxTree.ParseText($X)
      # Expression trees / dynamic code
      - pattern: Expression.Lambda($X).Compile()

    pattern-sanitizers:
      - pattern: int.Parse($X)
      - pattern: double.Parse($X)
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if ($WHITELIST.Contains($X)) { ... }

    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-94: Improper Control of Generation of Code (Code Injection)"]
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      vulnerability_class: [Code Injection]
      owasp: ["A03:2021 Injection"]
      technology: [csharp, dotnet, roslyn]
