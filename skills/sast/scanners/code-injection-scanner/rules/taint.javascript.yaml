rules:
  - id: noah-javascript-codeinj-taint
    severity: ERROR
    languages:
      - javascript
      - typescript
    mode: taint
    message: |
      Node.js HTTP 입력(req.query/params/body)이 eval/new Function/vm.runInNewContext에
      직접 흐르면 Code Injection → RCE. 안전: JSON.parse, Number 캐스트.
    pattern-sources:
      - pattern: req.query
      - pattern: req.query.$X
      - pattern: req.query[$X]
      - pattern: req.params
      - pattern: req.params.$X
      - pattern: req.body
      - pattern: req.body.$X
      - pattern: ctx.query
      - pattern: ctx.request.body
      # NestJS — decorator-based parameter injection
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Param($K) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Param() $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Query($K) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Query() $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Body($K) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Body() $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Headers($K) $X: $T, ...) { ... }
      # Hapi.js
      - pattern: request.params.$K
      - pattern: request.payload
      - pattern: request.payload.$K
      - pattern: request.query.$K
    pattern-sinks:
      - pattern: eval($X)
      - pattern: new Function($X)
      - pattern: new Function(..., $X)
      - pattern: Function($X)
      - pattern: vm.runInNewContext($X, ...)
      - pattern: vm.runInThisContext($X, ...)
      - pattern: vm.runInContext($X, ...)
      # vm2
      - pattern: new VM({...}).run($X)
      - pattern: new NodeVM({...}).run($X, ...)
      - pattern: $VM.run($X)
      # isolated-vm
      - pattern: $ISOLATE.compileScript($X)
      - pattern: $ISOLATE.compileScriptSync($X)
      - pattern: new ivm.Script($X)
    pattern-sanitizers:
      - pattern: JSON.parse($X)
      - pattern: Number($X)
      - pattern: parseInt($X, ...)
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-94: Improper Control of Generation of Code (Code Injection)"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      vulnerability_class:
        - Code Injection
      owasp:
        - A03:2021 Injection
      technology:
        - nodejs
        - express
