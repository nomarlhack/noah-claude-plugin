rules:
  - id: noah-php-codeinj-taint
    severity: ERROR
    languages:
      - php
    mode: taint
    message: |
      PHP $_GET/$_POST/$_REQUEST/$_COOKIE 값이 eval/assert/create_function에 직접
      흐르면 Code Injection → RCE (CWE-94). 2차(DB→eval) 케이스는 본 taint로 잡히지
      않으므로 pattern.php.yaml 후보와 함께 수동 검토. 안전: 정적 리터럴, json_decode,
      intval 캐스트.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_GET[...];
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_POST[...];
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_REQUEST[...];
      # Laravel (Illuminate\Http\Request)
      - pattern: $REQ->input($K)
      - pattern: $REQ->input($K, $DEFAULT)
      - pattern: $REQ->get($K)
      - pattern: $REQ->get($K, $DEFAULT)
      - pattern: $REQ->query($K)
      - pattern: $REQ->query($K, $DEFAULT)
      - pattern: $REQ->post($K)
      - pattern: $REQ->post($K, $DEFAULT)
      - pattern: $REQ->all()
      - pattern: $REQ->only($KEYS)
      - pattern: $REQ->except($KEYS)
      - pattern: $REQ->json($K)
      - pattern: $REQ->json($K, $DEFAULT)
      - pattern: $REQ->header($K)
      - pattern: $REQ->cookie($K)
      - pattern: request()->input($K)
      - pattern: request()->get($K)
      # Symfony (HttpFoundation\Request)
      - pattern: $REQ->query->get($K)
      - pattern: $REQ->request->get($K)
      - pattern: $REQ->attributes->get($K)
      - pattern: $REQ->headers->get($K)
      - pattern: $REQ->cookies->get($K)
      - pattern: $REQ->getContent()
      # CodeIgniter 3/4
      - pattern: $CI->input->get($K)
      - pattern: $CI->input->post($K)
      - pattern: $CI->input->get_post($K)
      - pattern: $CI->input->server($K)
      - pattern: $this->input->get($K)
      - pattern: $this->input->post($K)
      - pattern: $this->request->getVar($K)
      - pattern: $this->request->getGet($K)
      - pattern: $this->request->getPost($K)
    pattern-sinks:
      - pattern: eval($X);
      - pattern: assert($X)
      - pattern: create_function($A, $X)
      # 콜백 기반 코드 실행
      - pattern: call_user_func($X, ...)
      - pattern: call_user_func_array($X, ...)
      - pattern: array_map($X, ...)
      - pattern: usort($ARR, $X)
      - pattern: uasort($ARR, $X)
      - pattern: uksort($ARR, $X)
      - pattern: array_filter($ARR, $X)
      - pattern: array_walk($ARR, $X)
      # register 기반
      - pattern: register_shutdown_function($X)
      - pattern: register_tick_function($X)
      - pattern: set_error_handler($X)
      - pattern: set_exception_handler($X)
    pattern-sanitizers:
      - pattern: intval($X)
      - pattern: (int)$X
      - pattern: (int) $X
      - pattern: json_decode($X, ...)
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-94: Improper Control of Generation of Code (Code Injection)"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      vulnerability_class:
        - Code Injection
      owasp:
        - A03:2021 Injection
      technology:
        - php
