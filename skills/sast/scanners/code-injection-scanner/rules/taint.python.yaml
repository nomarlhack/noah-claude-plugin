rules:
  - id: noah-python-codeinj-taint
    severity: ERROR
    languages:
      - python
    mode: taint
    message: |
      Python HTTP 입력(request.GET/POST/args/form/json)이 eval/exec/compile에 직접
      흐르면 Code Injection → RCE. 안전: ast.literal_eval, json.loads, int 캐스트.
    pattern-sources:
      - pattern: request.GET[$K]
      - pattern: request.POST[$K]
      - pattern: request.GET.get($K, ...)
      - pattern: request.POST.get($K, ...)
      - pattern: request.args[$K]
      - pattern: request.args.get($K, ...)
      - pattern: request.form[$K]
      - pattern: request.form.get($K, ...)
      - pattern: request.json
      - pattern: request.data
      - pattern: request.values[$K]
      # Tornado RequestHandler
      - pattern: self.get_argument($K)
      - pattern: self.get_argument($K, $DEFAULT)
      - pattern: self.get_body_argument($K)
      - pattern: self.get_query_argument($K)
      - pattern: self.request.arguments
      - pattern: self.request.body
      - pattern: self.request.body_arguments
      # Sanic
      - pattern: request.args.get($K)
      - pattern: request.args[$K]
      - pattern: request.form.get($K)
      - pattern: request.form[$K]
      - pattern: request.json
      - pattern: request.json.get($K)
      - pattern: await request.json()
      - pattern: request.raw_args[$K]
    pattern-sinks:
      - pattern: eval($X)
      - pattern: exec($X)
      - pattern: compile($X, ...)
      # 동적 모듈 로딩 (import 기반 코드 실행)
      - pattern: __import__($X)
      - pattern: importlib.import_module($X)
      - pattern: importlib.__import__($X, ...)
      - pattern: runpy.run_module($X, ...)
      - pattern: runpy.run_path($X, ...)
      # code.InteractiveConsole
      - pattern: code.InteractiveConsole().runsource($X)
      - pattern: $CONSOLE.runsource($X)
      # timeit (eval 기반)
      - pattern: timeit.timeit($X, ...)
    pattern-sanitizers:
      - pattern: int($X)
      - pattern: float($X)
      - pattern: ast.literal_eval($X)
      - pattern: json.loads($X)
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-94: Improper Control of Generation of Code (Code Injection)"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      vulnerability_class:
        - Code Injection
      owasp:
        - A03:2021 Injection
      technology:
        - python
        - django
        - flask
        - fastapi
