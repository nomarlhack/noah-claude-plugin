rules:
  - id: noah-ruby-pathtrv-phase1-pattern
    severity: WARNING
    languages:
      - ruby
    message: |
      path-traversal-scanner Phase 1 sink/source 패턴 매치 (Ruby 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # Ruby file I/O sinks
      - pattern-regex: 'File\.open\s*\('
      - pattern-regex: 'File\.read\s*\('
      - pattern-regex: 'File\.write\s*\('
      - pattern-regex: 'File\.delete\s*\('
      - pattern-regex: 'IO\.read\s*\('
      - pattern-regex: 'IO\.write\s*\('
      - pattern-regex: 'Pathname\.new\s*\('
      - pattern-regex: 'FileUtils\.'
      # Rails/Sinatra 응답
      - pattern-regex: 'send_file\s'
      - pattern-regex: 'send_file\('
      - pattern-regex: 'render\s.*file:'
      # Rack 파일 서빙
      - pattern-regex: 'Rack::File\.new\s*\('
      # source
      - pattern-regex: 'params\['
      - pattern-regex: 'request\.params\['
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-22: Path Traversal"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
