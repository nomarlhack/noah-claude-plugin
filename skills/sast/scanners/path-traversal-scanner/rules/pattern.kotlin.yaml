rules:
  - id: noah-kotlin-pathtrv-phase1-pattern
    severity: WARNING
    languages:
      - kotlin
    message: |
      path-traversal-scanner Phase 1 sink/source 패턴 매치 (Kotlin 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # JVM/Kotlin 파일 I/O sink
      - pattern-regex: 'Paths\.get\s*\('
      - pattern-regex: 'Files\.newInputStream\s*\('
      - pattern-regex: 'Files\.newOutputStream\s*\('
      - pattern-regex: 'Files\.readAllBytes\s*\('
      - pattern-regex: 'Files\.readAllLines\s*\('
      - pattern-regex: 'Files\.write\s*\('
      - pattern-regex: 'Files\.copy\s*\('
      - pattern-regex: 'Files\.delete\s*\('
      - pattern-regex: 'File\s*\('
      - pattern-regex: 'FileInputStream\s*\('
      - pattern-regex: 'FileOutputStream\s*\('
      - pattern-regex: 'FileReader\s*\('
      # Android content provider / file URI 신뢰 경계
      - pattern-regex: 'openFileDescriptor\s*\('
      - pattern-regex: 'openAssetFileDescriptor\s*\('
      - pattern-regex: 'contentResolver\.openInputStream\s*\('
      - pattern-regex: 'grantUriPermission\s*\('
      - pattern-regex: 'FileProvider\.getUriForFile'
      # Spring Resource/Download
      - pattern-regex: 'ClassPathResource\s*\('
      - pattern-regex: 'InputStreamResource\s*\('
      # Spring source annotation
      - pattern-regex: '@RequestParam'
      - pattern-regex: '@PathVariable'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-22: Path Traversal"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
