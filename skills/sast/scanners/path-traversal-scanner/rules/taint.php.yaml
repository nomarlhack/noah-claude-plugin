rules:
  - id: noah-php-pathtrv-taint
    severity: ERROR
    languages:
      - php
    mode: taint
    message: |
      PHP $_GET/$_POST/$_REQUEST가 fopen/include/require/file_get_contents/unlink에
      들어가면 Path Traversal (또는 LFI/RFI). 안전: basename($X) + realpath 검사.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_GET[...];
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_POST[...];
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_REQUEST[...];
    pattern-sinks:
      - pattern: fopen($X, ...)
      - pattern: file_get_contents($X, ...)
      - pattern: file_get_contents($X)
      - pattern: file_put_contents($X, ...)
      - pattern: file($X, ...)
      - pattern: readfile($X)
      - pattern: include $X
      - pattern: include($X)
      - pattern: include_once $X
      - pattern: include_once($X)
      - pattern: require $X
      - pattern: require($X)
      - pattern: require_once $X
      - pattern: require_once($X)
      - pattern: unlink($X)
      - pattern: copy($A, $X)
      - pattern: rename($A, $X)
    pattern-sanitizers:
      - pattern: basename($X)
      - pattern: realpath($X)
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if (in_array($X, $WHITELIST)) { ... }
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-22: Path Traversal"]
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      vulnerability_class: [Path Traversal]
      owasp: ["A01:2021 Broken Access Control"]
      technology: [php]
