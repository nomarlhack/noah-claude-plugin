rules:
  - id: noah-php-pathtrv-taint
    severity: ERROR
    languages:
      - php
    mode: taint
    message: |
      PHP $_GET/$_POST/$_REQUEST가 fopen/include/require/file_get_contents/unlink에
      들어가면 Path Traversal (또는 LFI/RFI). 안전: basename($X) + realpath 검사.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_GET[...];
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_POST[...];
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_REQUEST[...];
      # Laravel (Illuminate\Http\Request)
      - pattern: $REQ->input($K)
      - pattern: $REQ->input($K, $DEFAULT)
      - pattern: $REQ->get($K)
      - pattern: $REQ->get($K, $DEFAULT)
      - pattern: $REQ->query($K)
      - pattern: $REQ->query($K, $DEFAULT)
      - pattern: $REQ->post($K)
      - pattern: $REQ->post($K, $DEFAULT)
      - pattern: $REQ->all()
      - pattern: $REQ->only($KEYS)
      - pattern: $REQ->except($KEYS)
      - pattern: $REQ->json($K)
      - pattern: $REQ->json($K, $DEFAULT)
      - pattern: $REQ->header($K)
      - pattern: $REQ->cookie($K)
      - pattern: request()->input($K)
      - pattern: request()->get($K)
      # Symfony (HttpFoundation\Request)
      - pattern: $REQ->query->get($K)
      - pattern: $REQ->request->get($K)
      - pattern: $REQ->attributes->get($K)
      - pattern: $REQ->headers->get($K)
      - pattern: $REQ->cookies->get($K)
      - pattern: $REQ->getContent()
      # CodeIgniter 3/4
      - pattern: $CI->input->get($K)
      - pattern: $CI->input->post($K)
      - pattern: $CI->input->get_post($K)
      - pattern: $CI->input->server($K)
      - pattern: $this->input->get($K)
      - pattern: $this->input->post($K)
      - pattern: $this->request->getVar($K)
      - pattern: $this->request->getGet($K)
      - pattern: $this->request->getPost($K)
    pattern-sinks:
      - pattern: fopen($X, ...)
      - pattern: file_get_contents($X, ...)
      - pattern: file_get_contents($X)
      - pattern: file_put_contents($X, ...)
      - pattern: file($X, ...)
      - pattern: readfile($X)
      - pattern: include $X
      - pattern: include($X)
      - pattern: include_once $X
      - pattern: include_once($X)
      - pattern: require $X
      - pattern: require($X)
      - pattern: require_once $X
      - pattern: require_once($X)
      - pattern: unlink($X)
      - pattern: copy($A, $X)
      - pattern: rename($A, $X)
    pattern-sanitizers:
      - pattern: basename($X)
      - pattern: realpath($X)
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if (in_array($X, $WHITELIST)) { ... }
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-22: Path Traversal"]
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      vulnerability_class: [Path Traversal]
      owasp: ["A01:2021 Broken Access Control"]
      technology: [php]
