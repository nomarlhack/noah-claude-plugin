rules:
  - id: noah-java-cmdi-taint
    severity: ERROR
    languages:
      - java
    mode: taint
    message: |
      Java Runtime.exec(String) / ProcessBuilder("sh", "-c", $X)에 Spring 컨트롤러
      입력이 결합되어 들어가면 OS Command Injection. ProcessBuilder(List<String>) +
      개별 토큰 분리가 안전.
    pattern-sources:
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @RequestParam $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @RequestParam(...) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @PathVariable $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @RequestBody $X, ...) { ... }
      # JAX-RS / Jersey / Quarkus — REST resource method parameters
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @QueryParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @PathParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @FormParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @HeaderParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @MatrixParam($K) $X, ...) { ... }
      # Vert.x (reactive web)
      - pattern: $CTX.queryParam($K)
      - pattern: $CTX.queryParam($K).get(0)
      - pattern: $CTX.pathParam($K)
      - pattern: $CTX.body().asString()
      - pattern: $CTX.body().asJsonObject()
      - pattern: $REQ.getParam($K)
      - pattern: $REQ.params().get($K)
      # Struts2 / Struts1 — ActionContext / ActionForm
      - pattern: ActionContext.getContext().getParameters()
      - pattern: $FORM.get($K)
      - pattern: $SERVLET.getParameter($K)
      - pattern: $SERVLET.getParameterValues($K)
    pattern-sinks:
      - pattern: Runtime.getRuntime().exec($X)
      - pattern: Runtime.getRuntime().exec($X, ...)
      - pattern: new ProcessBuilder($X)
      - pattern: new ProcessBuilder("sh", "-c", $X)
      - pattern: new ProcessBuilder("bash", "-c", $X)
      # Windows CMD
      - pattern: new ProcessBuilder("cmd", "/c", $X)
      - pattern: new ProcessBuilder("cmd.exe", "/c", $X)
      - pattern: Runtime.getRuntime().exec(new String[]{"cmd", "/c", $X})
      # PowerShell
      - pattern: new ProcessBuilder("powershell", "-Command", $X)
      - pattern: new ProcessBuilder("powershell.exe", "-Command", $X)
      - pattern: new ProcessBuilder("powershell", "-c", $X)
      # zsh
      - pattern: new ProcessBuilder("zsh", "-c", $X)
    pattern-sanitizers:
      - pattern: $X.matches($P)
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-78: OS Command Injection"]
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      vulnerability_class: [Command Injection]
      owasp: ["A03:2021 Injection"]
      technology: [java, spring]
