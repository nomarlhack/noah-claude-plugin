rules:
  - id: noah-kotlin-cmdi-taint
    severity: ERROR
    languages:
      - kotlin
    mode: taint
    message: |
      Kotlin + Spring 컨트롤러 입력(@RequestParam/@PathVariable/@RequestBody)이
      ProcessBuilder/Runtime.exec에 직접 들어가면 OS Command Injection → RCE.
      안전: ProcessBuilder(listOf("cmd", arg)) 토큰 분리, 화이트리스트.
    pattern-sources:
      - patterns:
          - pattern: $X
          - pattern-inside: |
              fun $METHOD(..., @RequestParam $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              fun $METHOD(..., @RequestParam(...) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              fun $METHOD(..., @PathVariable $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              fun $METHOD(..., @PathVariable(...) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              fun $METHOD(..., @RequestBody $X: $T, ...) { ... }

    pattern-sinks:
      - pattern: Runtime.getRuntime().exec($X)
      - pattern: Runtime.getRuntime().exec($X, ...)
      - pattern: "ProcessBuilder($X)"
      - pattern: "ProcessBuilder(\"sh\", \"-c\", $X)"
      - pattern: "ProcessBuilder(\"bash\", \"-c\", $X)"
      - pattern: "ProcessBuilder(listOf(\"sh\", \"-c\", $X))"
      - pattern: "ProcessBuilder(listOf(\"bash\", \"-c\", $X))"

    pattern-sanitizers:
      - pattern: $X.toInt()
      - pattern: $X.toLong()
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if ($WHITELIST.contains($X)) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              require($WHITELIST.contains($X)) { ... }

    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      vulnerability_class:
        - Command Injection
      owasp:
        - "A03:2021 Injection"
      technology:
        - kotlin
        - spring
