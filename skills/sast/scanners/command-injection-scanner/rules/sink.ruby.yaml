rules:
  - id: noah-ruby-cmdi-shell-sink
    severity: WARNING
    languages: [ruby]
    message: |
      OS 명령 실행 sink 능력형 매치 (system/exec/`backtick`/%x/IO.popen/Open3). Safe-by-Proof §2-D.
    metadata:
      capability_sink: true
      cwe: ["CWE-78: Improper Neutralization of Special Elements used in an OS Command"]
    patterns:
      - pattern-either:
          - pattern: system($X)
          - pattern: system($X, ...)
          - pattern: exec($X)
          - pattern: IO.popen($X, ...)
          - pattern: Open3.capture2($X, ...)
          - pattern: Open3.capture3($X, ...)
          - pattern: Open3.popen3($X, ...)
          - pattern: "`...`"
