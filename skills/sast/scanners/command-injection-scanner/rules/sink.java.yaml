rules:
  # Runtime.exec 정밀 매치. `$R.exec`는 임의 .exec(regex 등)까지 과매치하므로 Runtime으로 한정.
  # var-저장 Runtime은 본 sink 룰이 놓치며(저-recall, 정밀 우선) instruction-level + broad pattern이 보완.
  - id: noah-java-cmdi-shell-sink
    severity: WARNING
    languages: [java]
    message: |
      OS 명령 실행 sink 능력형 매치 (Runtime.getRuntime().exec). Safe-by-Proof §2-D.
    metadata:
      capability_sink: true
      cwe: ["CWE-78: Improper Neutralization of Special Elements used in an OS Command"]
    patterns:
      - pattern: Runtime.getRuntime().exec($X)
      - metavariable-pattern:
          metavariable: $X
          patterns:
            - pattern-not: "\"...\""
