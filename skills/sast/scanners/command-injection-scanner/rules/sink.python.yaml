rules:
  - id: noah-python-cmdi-shell-sink
    severity: WARNING
    languages: [python]
    message: |
      OS 명령 실행 sink 능력형 매치 (os.system/os.popen/subprocess shell=True). Safe-by-Proof §2-D.
    metadata:
      capability_sink: true
      cwe: ["CWE-78: Improper Neutralization of Special Elements used in an OS Command"]
    patterns:
      - pattern-either:
          - pattern: os.system($X)
          - pattern: os.popen($X, ...)
          - pattern: subprocess.call(..., shell=True, ...)
          - pattern: subprocess.run(..., shell=True, ...)
          - pattern: subprocess.Popen(..., shell=True, ...)
          - pattern: subprocess.check_output(..., shell=True, ...)
          - pattern: subprocess.getoutput($X)
