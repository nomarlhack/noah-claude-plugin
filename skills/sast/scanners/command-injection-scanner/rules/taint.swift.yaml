rules:
  - id: noah-swift-cmdi-taint
    severity: ERROR
    languages:
      - swift
    mode: taint
    message: |
      Swift에서 사용자 입력이 Process() / NSTask에 직접 전달되면 OS Command Injection.
      iOS 앱에서 Process()는 macOS에서만 동작하지만 macOS 앱/CLI 도구에서 위험.
      안전: 인자를 배열로 분리 (arguments 배열 사용), 화이트리스트 검증.
    pattern-sources:
      - pattern: "$COMPONENTS.queryItems"
      - pattern: "$ITEM.value"
      - pattern: "CommandLine.arguments[$N]"
      - pattern: "ProcessInfo.processInfo.environment[$K]"
      - pattern: "UserDefaults.standard.string(forKey: $K)"

    pattern-sinks:
      # Process / NSTask
      - pattern: "$PROC.launchPath = $X"
      - pattern: "$PROC.arguments = $X"
      - pattern: "$TASK.launchPath = $X"
      - pattern: "$TASK.arguments = $X"
      - pattern: "Process.launchedProcess(launchPath: $X, arguments: $ARGS)"

    pattern-sanitizers:
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if $WHITELIST.contains($X) { ... }

    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-78: OS Command Injection"]
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      vulnerability_class: [Command Injection]
      owasp: ["A03:2021 Injection"]
      technology: [ios, swift, macos, process]
