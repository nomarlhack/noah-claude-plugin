rules:
  - id: noah-python-cmdi-taint
    severity: ERROR
    languages:
      - python
    mode: taint
    message: |
      Python에서 사용자 입력이 os.system/subprocess.run/Popen(shell=True)/os.popen
      등에 직접 들어가면 OS Command Injection. shlex.quote 또는 shell=False + 리스트
      인자로 안전 처리.
    pattern-sources:
      - pattern: request.GET[$K]
      - pattern: request.POST[$K]
      - pattern: request.args.get($K, ...)
      - pattern: request.form.get($K, ...)
      - pattern: request.json
      - pattern: request.data
      - pattern: request.body
      # Tornado RequestHandler
      - pattern: self.get_argument($K)
      - pattern: self.get_argument($K, $DEFAULT)
      - pattern: self.get_body_argument($K)
      - pattern: self.get_query_argument($K)
      - pattern: self.request.arguments
      - pattern: self.request.body
      - pattern: self.request.body_arguments
      # Sanic
      - pattern: request.args.get($K)
      - pattern: request.args[$K]
      - pattern: request.form.get($K)
      - pattern: request.form[$K]
      - pattern: request.json
      - pattern: request.json.get($K)
      - pattern: await request.json()
      - pattern: request.raw_args[$K]
    pattern-sinks:
      - pattern: os.system($X)
      - pattern: os.popen($X)
      - pattern: subprocess.call($X, ..., shell=True)
      - pattern: subprocess.run($X, ..., shell=True)
      - pattern: subprocess.Popen($X, ..., shell=True)
      - pattern: subprocess.check_output($X, ..., shell=True)
      - patterns:
          - pattern-either:
              - pattern: subprocess.call($X)
              - pattern: subprocess.run($X)
              - pattern: subprocess.Popen($X)
          - pattern-not: subprocess.call([...])
          - pattern-not: subprocess.run([...])
          - pattern-not: subprocess.Popen([...])
      - pattern: commands.getoutput($X)
      # asyncio subprocess (async Python)
      - pattern: await asyncio.create_subprocess_shell($X, ...)
      - pattern: await asyncio.create_subprocess_exec($X, ...)
      - pattern: asyncio.create_subprocess_shell($X, ...)
      - pattern: asyncio.create_subprocess_exec($X, ...)
      # os.exec* (프로세스 교체 방식)
      - pattern: os.execv($X, ...)
      - pattern: os.execve($X, ...)
      - pattern: os.execvp($X, ...)
      - pattern: os.execvpe($X, ...)
      # os.spawn* 계열
      - pattern: os.spawnl($M, $X, ...)
      - pattern: os.spawnle($M, $X, ...)
      - pattern: os.spawnlp($M, $X, ...)
      - pattern: os.spawnv($M, $X, ...)
      # pty 기반
      - pattern: pty.spawn($X, ...)
    pattern-sanitizers:
      - pattern: shlex.quote($X)
      - pattern: re.match($P, $X)
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if $X in $WHITELIST:
                  ...
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-78: OS Command Injection"]
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      vulnerability_class: [Command Injection]
      owasp: ["A03:2021 Injection"]
      technology: [python, django, flask, fastapi]
