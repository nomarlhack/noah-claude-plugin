rules:
  - id: noah-kotlin-cmdi-phase1-pattern
    severity: WARNING
    languages:
      - kotlin
    message: |
      command-injection-scanner Phase 1 sink/source 패턴 매치 (Kotlin 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # JVM 명령 실행 sink
      - pattern-regex: 'Runtime\.getRuntime\s*\(\s*\)'
      - pattern-regex: 'Runtime\.exec\s*\('
      - pattern-regex: 'ProcessBuilder\s*\('
      - pattern-regex: '\.exec\s*\(\s*"[^"]*-c'
      # Kotlin 편의 확장 (kotlin-process 등)
      - pattern-regex: 'ProcessBuilder\s*\(\s*listOf'
      # Spring source annotation
      - pattern-regex: '@RequestParam'
      - pattern-regex: '@PathVariable'
      - pattern-regex: '@RequestBody'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-78: OS Command Injection"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
