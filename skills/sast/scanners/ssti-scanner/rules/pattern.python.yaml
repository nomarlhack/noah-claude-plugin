rules:
  - id: noah-python-ssti-phase1-pattern
    severity: WARNING
    languages:
      - python
    message: |
      ssti-scanner Phase 1 sink/source 패턴 매치 (Python 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'ejs\.render\s*\('
      - pattern-regex: 'pug\.render\s*\('
      - pattern-regex: 'render_template_string\s*\('
      - pattern-regex: 'ERB\.new\s*\('
      - pattern-regex: 'Liquid::Template\.parse'
      - pattern-regex: 'Template\s*\('
      - pattern-regex: 'renderString\s*\('
      - pattern-regex: 'render_string\s*\('
      - pattern-regex: 'template_string'
      - pattern-regex: 'parseExpression\s*\('
      - pattern-regex: 'Mustache\.render'
      - pattern-regex: 'Handlebars\.compile\s*\('
      - pattern-regex: '__import__'
      - pattern-regex: 'Velocity\.evaluate'
      - pattern-regex: 'FreeMarker'
      - pattern-regex: 'Thymeleaf'
      - pattern-regex: 'th:utext'
      - pattern-regex: 'Twig'
      - pattern-regex: 'text/template'
      - pattern-regex: '@RequestParam'
      - pattern-regex: '@RequestBody'
      - pattern-regex: 'req\.query'
      - pattern-regex: 'req\.body'
      # Mako template
      - pattern-regex: 'mako\.template\.Template\s*\('
      # Chameleon
      - pattern-regex: 'chameleon\.PageTemplate\s*\('
      # Tornado template
      - pattern-regex: 'tornado\.template\.Template\s*\('
      # Genshi MarkupTemplate
      - pattern-regex: 'MarkupTemplate\s*\('
      # Mako text= kwarg
      - pattern-regex: 'Template\s*\(text='
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-94: Server-Side Template Injection"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
