rules:
  - id: noah-ruby-ssti-taint
    severity: ERROR
    languages:
      - ruby
    mode: taint
    message: |
      Ruby에서 params/request.params가 ERB.new(user_input) / Liquid::Template.parse에
      직접 들어가면 Server-Side Template Injection → RCE.
      안전: 템플릿은 파일로 관리하고 사용자 입력은 바인딩 변수로만 전달.
    pattern-sources:
      - pattern: params[$K]
      - pattern: params.require($K)
      - pattern: request.params[$K]

    pattern-sinks:
      # ERB
      - pattern: ERB.new($X)
      - pattern: ERB.new($X, ...).result
      - pattern: ERB.new($X, ...).result_with_hash(...)
      # Liquid
      - pattern: Liquid::Template.parse($X)
      - pattern: Liquid::Template.parse($X).render(...)
      # Tilt (generic template wrapper — 사용자 입력이 template 문자열로 전달되면 위험)
      - pattern: Tilt.new($X)
      - pattern: Tilt[$EXT].new { $X }
      # Haml
      - pattern: Haml::Engine.new($X)
      - pattern: Haml::Engine.new($X).render(...)
      - pattern: Haml::Template.new($X)
      # Slim
      - pattern: Slim::Template.new { $X }
      - pattern: Slim::Template.new($X)
      # Mustache
      - pattern: Mustache.render($X, ...)
      - pattern: $MUSTACHE.render($X, ...)
      # Erubi (ERB 후계자)
      - pattern: Erubi::Engine.new($X)
      - pattern: Erubi::Engine.new($X).src

    pattern-sanitizers:
      - pattern: CGI.escapeHTML($X)
      - pattern: Rack::Utils.escape_html($X)
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if $X.is_a?(String) && $X.match?(/\A[\w\s]+\z/)
                ...
              end

    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-94: Improper Control of Generation of Code"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      vulnerability_class:
        - Injection
      owasp:
        - "A03:2021 Injection"
      technology:
        - ruby
        - rails
        - sinatra
        - liquid
        - erb
