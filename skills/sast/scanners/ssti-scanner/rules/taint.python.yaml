rules:
  - id: noah-python-ssti-taint
    severity: ERROR
    languages:
      - python
    mode: taint
    message: |
      Python에서 HTTP 입력이 render_template_string / Template().render / Jinja2
      Environment.from_string에 들어가면 Server-Side Template Injection → RCE.
      안전: 템플릿 파일 기반 렌더링(render_template) + 변수만 컨텍스트로 전달.
    pattern-sources:
      - pattern: request.GET[$K]
      - pattern: request.POST[$K]
      - pattern: request.args.get($K, ...)
      - pattern: request.form.get($K, ...)
      - pattern: request.json
      - pattern: request.values[$K]
      # Tornado RequestHandler
      - pattern: self.get_argument($K)
      - pattern: self.get_argument($K, $DEFAULT)
      - pattern: self.get_body_argument($K)
      - pattern: self.get_query_argument($K)
      - pattern: self.request.arguments
      - pattern: self.request.body
      - pattern: self.request.body_arguments
      # Sanic
      - pattern: request.args.get($K)
      - pattern: request.args[$K]
      - pattern: request.form.get($K)
      - pattern: request.form[$K]
      - pattern: request.json
      - pattern: request.json.get($K)
      - pattern: await request.json()
      - pattern: request.raw_args[$K]
    pattern-sinks:
      # Jinja2 / Flask
      - pattern: render_template_string($X, ...)
      - pattern: render_template_string($X)
      - pattern: Template($X)
      - pattern: Template($X).render(...)
      - pattern: $ENV.from_string($X)
      - pattern: jinja2.Template($X)
      - pattern: flask.render_template_string($X, ...)
      # Mako
      - pattern: "Template(text=$X)"
      - pattern: "Template(text=$X, ...)"
      - pattern: "$LOOKUP.get_template($X).render()"
      - pattern: "mako.template.Template(text=$X)"
      - pattern: "$TMPL.render_unicode($X)"
      # Chameleon
      - pattern: "PageTemplate($X)"
      - pattern: "PageTemplate($X)()"
      - pattern: "chameleon.PageTemplate($X)"
      # Tornado template
      - pattern: "tornado.template.Template($X)"
      - pattern: "tornado.template.Template($X).generate(...)"
      # Genshi
      - pattern: "MarkupTemplate($X)"
      - pattern: "MarkupTemplate($X).generate(...)"
      # Cheetah
      - pattern: "Template($SRC, searchList=$X)"
      # String template (generic Python)
      - pattern: "$T.substitute($X)"
      - pattern: "$T.safe_substitute($X)"
    pattern-sanitizers: []
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-94: Server-Side Template Injection"]
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      vulnerability_class: [Injection]
      owasp: ["A03:2021 Injection"]
      technology: [python, flask, jinja2, mako, chameleon, tornado, genshi]
