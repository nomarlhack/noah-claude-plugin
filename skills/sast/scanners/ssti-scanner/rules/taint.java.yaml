rules:
  - id: noah-java-ssti-taint
    severity: ERROR
    languages:
      - java
    mode: taint
    message: |
      Java Spring 컨트롤러 입력이 SpelExpressionParser.parseExpression /
      Velocity.evaluate / Freemarker Template(new StringReader)에 들어가면
      SSTI / SpEL Injection → RCE.
    pattern-sources:
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @RequestParam $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @PathVariable $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @RequestBody $X, ...) { ... }
      # JAX-RS / Jersey / Quarkus — REST resource method parameters
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @QueryParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @PathParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @FormParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @HeaderParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @MatrixParam($K) $X, ...) { ... }
      # Vert.x (reactive web)
      - pattern: $CTX.queryParam($K)
      - pattern: $CTX.queryParam($K).get(0)
      - pattern: $CTX.pathParam($K)
      - pattern: $CTX.body().asString()
      - pattern: $CTX.body().asJsonObject()
      - pattern: $REQ.getParam($K)
      - pattern: $REQ.params().get($K)
      # Struts2 / Struts1 — ActionContext / ActionForm
      - pattern: ActionContext.getContext().getParameters()
      - pattern: $FORM.get($K)
      - pattern: $SERVLET.getParameter($K)
      - pattern: $SERVLET.getParameterValues($K)
    pattern-sinks:
      - pattern: $PARSER.parseExpression($X)
      - pattern: new SpelExpressionParser().parseExpression($X)
      - pattern: Velocity.evaluate($CTX, $W, $TAG, $X)
      - pattern: $ENGINE.eval($X)
      - pattern: new Template($N, new StringReader($X), $CFG)
      # Thymeleaf (Spring Boot 기본 템플릿 엔진) — StringTemplateSpec
      - pattern: $ENGINE.process($X, $CTX)
      - pattern: new StringTemplateSpec($X, ...)
      # Pebble template engine
      - pattern: $PEBBLE.getLiteralTemplate($X)
      - pattern: $PEBBLE.getLiteralTemplate($X).evaluate($W, $CTX)
      # Groovy SimpleTemplateEngine / GStringTemplateEngine
      - pattern: new SimpleTemplateEngine().createTemplate($X)
      - pattern: new GStringTemplateEngine().createTemplate($X)
      # Mustache.java
      - pattern: new DefaultMustacheFactory().compile(new StringReader($X), $NAME)
    pattern-sanitizers:
      - pattern: new SimpleEvaluationContext(...)
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-94: Server-Side Template Injection"]
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      vulnerability_class: [Injection]
      owasp: ["A03:2021 Injection"]
      technology: [java, spring, spel, velocity, freemarker]
