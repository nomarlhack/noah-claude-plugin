rules:
  - id: noah-java-idor-phase1-pattern
    severity: WARNING
    languages:
      - java
    message: |
      idor-scanner Phase 1 sink/source 패턴 매치 (Java 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: '@PathVariable\b'
      - pattern-regex: '@RequestParam\b'
      - pattern-regex: '@RequestBody\b'
      - pattern-regex: '@QueryParam\b'
      - pattern-regex: '@PathParam\b'
      - pattern-regex: 'findById\s*\('
      - pattern-regex: 'findOne\s*\('
      - pattern-regex: 'getById\s*\('
      - pattern-regex: 'getReferenceById\s*\('
      - pattern-regex: '@PreAuthorize\b'
      - pattern-regex: '@PostAuthorize\b'
      - pattern-regex: '@Secured\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-639: Insecure Direct Object Reference"
      confidence: LOW
      likelihood: LOW
      impact: HIGH

  - id: noah-java-idor-session-identity-override
    severity: WARNING
    languages:
      - java
    message: |
      신원 식별자가 클라이언트 입력과 세션 입력의 null-폴백(삼항/Optional.orElse)으로 해석됨 —
      클라이언트가 대상 신원을 지정/덮어쓸 수 있어 IDOR/BOLA 위험. 소유권 검증(세션 신원과의 대조) 확인 필요.
      고정밀: 클라이언트(@RequestParam/커맨드객체 getter)와 세션(@RequestHeader)이 섞인 null-폴백만 매치.
    patterns:
      - pattern-either:
          # (a) 삼항: 클라(@RequestParam) <-> 세션(@RequestHeader)
          - patterns:
              - pattern-either:
                  - pattern: "$C != null ? $C : $S"
                  - pattern: "$S != null ? $S : $C"
              - pattern-inside: "$RT $M(..., @RequestParam(...) $TC $C, ...) { ... }"
              - pattern-inside: "$RT $M(..., @RequestHeader(...) $TS $S, ...) { ... }"
          # (a2) Optional.ofNullable(클라).orElse(세션) 및 역방향
          - patterns:
              - pattern-either:
                  - pattern: "Optional.ofNullable($C).orElse($S)"
                  - pattern: "Optional.ofNullable($S).orElse($C)"
              - pattern-inside: "$RT $M(..., @RequestParam(...) $TC $C, ...) { ... }"
              - pattern-inside: "$RT $M(..., @RequestHeader(...) $TS $S, ...) { ... }"
          # (b) 세션 헤더 폴백 -> 커맨드객체 getter (GET 케이스)
          - patterns:
              - pattern-either:
                  - pattern: "$S != null ? $S : $OBJ.$G()"
                  - pattern: "Optional.ofNullable($S).orElse($OBJ.$G())"
              - pattern-inside: "$RT $M(..., @RequestHeader(...) $TS $S, ...) { ... }"
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-639: Insecure Direct Object Reference"
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
