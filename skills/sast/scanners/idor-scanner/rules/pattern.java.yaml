rules:
  - id: noah-java-idor-phase1-pattern
    severity: WARNING
    languages:
      - java
    message: |
      idor-scanner Phase 1 sink/source 패턴 매치 (Java 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: '@PathVariable\b'
      - pattern-regex: '@RequestParam\b'
      - pattern-regex: '@RequestBody\b'
      - pattern-regex: '@QueryParam\b'
      - pattern-regex: '@PathParam\b'
      - pattern-regex: 'findById\s*\('
      - pattern-regex: 'findOne\s*\('
      - pattern-regex: 'getById\s*\('
      - pattern-regex: 'getReferenceById\s*\('
      - pattern-regex: '@PreAuthorize\b'
      - pattern-regex: '@PostAuthorize\b'
      - pattern-regex: '@Secured\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-639: Insecure Direct Object Reference"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
