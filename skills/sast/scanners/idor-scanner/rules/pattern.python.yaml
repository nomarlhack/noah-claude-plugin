rules:
  - id: noah-python-idor-phase1-pattern
    severity: WARNING
    languages:
      - python
    message: |
      idor-scanner Phase 1 sink/source 패턴 매치 (Python 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'request\.args\b'
      - pattern-regex: 'request\.GET\b'
      - pattern-regex: 'request\.POST\b'
      - pattern-regex: 'kwargs\b'
      - pattern-regex: '\.objects\.get\s*\('
      - pattern-regex: '\.objects\.filter\s*\('
      - pattern-regex: 'get_object_or_404\s*\('
      - pattern-regex: '@permission_required\b'
      - pattern-regex: 'has_perm\s*\('
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-639: Insecure Direct Object Reference"
      confidence: LOW
      likelihood: LOW
      impact: HIGH

  - id: noah-python-idor-session-identity-override
    severity: WARNING
    languages: [python]
    message: |
      신원 식별자가 클라이언트 입력과 세션 입력의 'or' 폴백으로 해석됨 — 클라이언트가
      대상 신원을 지정/덮어쓸 수 있어 IDOR/BOLA 위험. 소유권 검증 확인 필요.
      고정밀: 클라이언트(request.args/GET/POST/values)와 세션(session/current_user/request.user)이 섞인 or만 매치.
    patterns:
      - pattern-either:
          - pattern: $C or $S
          - pattern: $S or $C
      - metavariable-pattern:
          metavariable: $C
          pattern-either:
            - pattern: request.args.get(...)
            - pattern: request.args[$X]
            - pattern: request.GET.get(...)
            - pattern: request.GET[$X]
            - pattern: request.POST.get(...)
            - pattern: request.values.get(...)
            - pattern: request.form.get(...)
      - metavariable-pattern:
          metavariable: $S
          pattern-either:
            - pattern: session[$Y]
            - pattern: session.get(...)
            - pattern: request.session[$Y]
            - pattern: request.user.$Y
            - pattern: current_user.$Y
            - pattern: g.user.$Y
    metadata:
      category: security
      cwe:
        - "CWE-639: Insecure Direct Object Reference"
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
