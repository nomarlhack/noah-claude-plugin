rules:
  - id: noah-python-idor-phase1-pattern
    severity: WARNING
    languages:
      - python
    message: |
      idor-scanner Phase 1 sink/source 패턴 매치 (Python 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'request\.args\b'
      - pattern-regex: 'request\.GET\b'
      - pattern-regex: 'request\.POST\b'
      - pattern-regex: 'kwargs\b'
      - pattern-regex: '\.objects\.get\s*\('
      - pattern-regex: '\.objects\.filter\s*\('
      - pattern-regex: 'get_object_or_404\s*\('
      - pattern-regex: '@permission_required\b'
      - pattern-regex: 'has_perm\s*\('
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-639: Insecure Direct Object Reference"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
