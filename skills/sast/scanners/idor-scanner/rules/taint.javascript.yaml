rules:
  - id: noah-javascript-idor-missing-owner-gate-taint
    severity: WARNING
    languages:
      - javascript
      - typescript
    mode: taint
    message: |
      외부입력→리소스접근→소유권게이트부재 (IDOR 검토 후보, JS/TS).
      Express/Fastify/Next.js 핸들러가 req.params/query/body의 식별자를
      DB 조회/수정/삭제에 직접 전달하는데 소유권 검증이 없음.
      [중요] "검증의 부재" — service/middleware 계층의 소유권 검증을
      phase1.md 절차로 확인 후 제외하라.
    pattern-sources:
      - pattern: req.params
      - pattern: req.params.$K
      - pattern: req.params[$K]
      - pattern: req.query
      - pattern: req.query.$K
      - pattern: req.query[$K]
      - pattern: req.body
      - pattern: req.body.$K
      - pattern: req.body[$K]
      # Next.js App Router
      - pattern: params.$K
      - pattern: params[$K]
      - pattern: searchParams.get($K)
      - pattern: $REQ.nextUrl.searchParams.get($K)
      # Fastify
      - pattern: request.params.$K
      - pattern: request.params[$K]
      - pattern: request.query.$K

      # NestJS — decorator-based parameter injection
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Param($K) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Param() $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Query($K) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Query() $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Body($K) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Body() $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Headers($K) $X: $T, ...) { ... }
      # Hapi.js
      - pattern: request.params.$K
      - pattern: request.payload
      - pattern: request.payload.$K
      - pattern: request.query.$K
    pattern-sinks:
      # Prisma
      - pattern: "$DB.$MODEL.findUnique({where: {id: $X}})"
      - pattern: "$DB.$MODEL.findUnique({where: {$K: $X}})"
      - pattern: "$DB.$MODEL.findFirst({where: {id: $X}})"
      - pattern: "$DB.$MODEL.update({where: {id: $X}, ...})"
      - pattern: "$DB.$MODEL.delete({where: {id: $X}})"
      - pattern: "$prisma.$MODEL.findUnique({where: {id: $X}})"
      # TypeORM
      - pattern: "$REPO.findOne({where: {id: $X}})"
      - pattern: "$REPO.findOneBy({id: $X})"
      - pattern: "$REPO.findOneOrFail({where: {id: $X}})"
      - pattern: $REPO.update($X, ...)
      - pattern: $REPO.delete($X)
      # Mongoose
      - pattern: $MODEL.findById($X)
      - pattern: $MODEL.findByIdAndUpdate($X, ...)
      - pattern: $MODEL.findByIdAndDelete($X)
      - pattern: "$MODEL.findOne({_id: $X})"
      # Sequelize
      - pattern: $MODEL.findByPk($X)
      - pattern: "$MODEL.findOne({where: {id: $X}})"
      # Raw SQL (id 직접 보간)
      - pattern: $CONN.query(`...${$X}...`)
      # Drizzle ORM
      - pattern: $DB.select().from($TBL).where(eq($TBL.id, $X))
      - pattern: $DB.delete($TBL).where(eq($TBL.id, $X))
      # Knex
      - pattern: $KNEX($TBL).where('id', $X).first()
      - pattern: "$KNEX($TBL).where({ id: $X }).first()"

    pattern-sanitizers:
      # userId 일치 검증
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if ($OBJ.userId !== req.user.id) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if ($OBJ.ownerId !== req.user.id) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if ($OBJ.userId !== $SESSION.userId) { ... }

    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-639: Authorization Bypass Through User-Controlled Key"
      confidence: MEDIUM
      likelihood: HIGH
      impact: HIGH
      vulnerability_class:
        - IDOR
      owasp:
        - "A01:2021 Broken Access Control"
      technology:
        - nodejs
        - express
        - fastify
        - prisma
        - typeorm
        - mongoose
        - sequelize
