rules:
  - id: noah-ruby-idor-phase1-pattern
    severity: WARNING
    languages:
      - ruby
    message: |
      idor-scanner Phase 1 sink/source 패턴 매치 (Ruby 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'params\[:'
      - pattern-regex: '\.find\s*\('
      - pattern-regex: '\.find_by\s*\('
      - pattern-regex: '\.where\s*\('
      - pattern-regex: 'authorize\b'
      - pattern-regex: 'current_user\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-639: Insecure Direct Object Reference"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
