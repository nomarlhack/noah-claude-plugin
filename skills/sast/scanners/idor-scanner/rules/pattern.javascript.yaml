rules:
  - id: noah-javascript-idor-phase1-pattern
    severity: WARNING
    languages:
      - javascript
    message: |
      idor-scanner Phase 1 sink/source 패턴 매치 (JavaScript 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'req\.params\b'
      - pattern-regex: 'req\.query\b'
      - pattern-regex: 'req\.body\b'
      - pattern-regex: 'findById\s*\('
      - pattern-regex: 'findOne\s*\('
      - pattern-regex: 'findByPk\s*\('
      - pattern-regex: 'findUnique\s*\('
      - pattern-regex: 'params\.id\b'
      - pattern-regex: 'useRouter\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-639: Insecure Direct Object Reference"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
