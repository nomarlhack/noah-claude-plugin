rules:
  - id: noah-php-idor-phase1-pattern
    severity: WARNING
    languages:
      - php
    message: |
      idor-scanner Phase 1 sink/source 패턴 매치 (PHP 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: '\$_GET\b'
      - pattern-regex: '\$_POST\b'
      - pattern-regex: '\$_REQUEST\b'
      - pattern-regex: '->input\s*\('
      - pattern-regex: '->route\s*\('
      - pattern-regex: '::find\s*\('
      - pattern-regex: '::findOrFail\s*\('
      - pattern-regex: 'Gate::authorize\s*\('
      - pattern-regex: '\$this->authorize\s*\('
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-639: Insecure Direct Object Reference"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
