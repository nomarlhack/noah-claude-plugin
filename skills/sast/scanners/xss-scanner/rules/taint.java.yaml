rules:
  - id: noah-java-spring-xss-taint
    severity: ERROR
    languages:
      - java
    mode: taint
    message: |
      Java + Spring MVC 컨트롤러 입력이 ResponseBody, Thymeleaf th:utext,
      PrintWriter.write 등 raw HTML sink로 들어가면 Reflected/Stored XSS.
      Spring 4.0+의 HtmlUtils.htmlEscape, OWASP Encoder.forHtml로 escape.
    pattern-sources:
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @RequestParam $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @RequestParam(...) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @PathVariable $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @PathVariable(...) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @RequestBody $X, ...) { ... }
      # JAX-RS / Jersey / Quarkus — REST resource method parameters
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @QueryParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @PathParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @FormParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @HeaderParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @MatrixParam($K) $X, ...) { ... }
      # Vert.x (reactive web)
      - pattern: $CTX.queryParam($K)
      - pattern: $CTX.queryParam($K).get(0)
      - pattern: $CTX.pathParam($K)
      - pattern: $CTX.body().asString()
      - pattern: $CTX.body().asJsonObject()
      - pattern: $REQ.getParam($K)
      - pattern: $REQ.params().get($K)
      # Struts2 / Struts1 — ActionContext / ActionForm
      - pattern: ActionContext.getContext().getParameters()
      - pattern: $FORM.get($K)
      - pattern: $SERVLET.getParameter($K)
      - pattern: $SERVLET.getParameterValues($K)
    pattern-sinks:
      - pattern: $RESP.getWriter().write($X)
      - pattern: $RESP.getWriter().print($X)
      - pattern: $RESP.getWriter().println($X)
      - pattern: response.getWriter().write($X)
      - pattern: model.addAttribute($K, $X)
      # JSP/Servlet 직접 출력
      - pattern: out.print($X)
      - pattern: out.println($X)
      - pattern: $OUT.print($X)
      - pattern: $OUT.println($X)
      - pattern: $OS.write($X.getBytes())
      # Spring @ResponseBody / ResponseEntity<String>
      - pattern: ResponseEntity.ok($X)
      - pattern: ResponseEntity.ok().body($X)
      - pattern: ResponseEntity.status($S).body($X)
      # Thymeleaf th:utext (unescaped) — Spring 모델 attribute
      - pattern: model.addAttribute($K, $X)
      # JSP EL unescaped: ${XSS} — 정적 분석 한계, 패턴으로 source 추적
      - pattern: $RESP.sendRedirect($X)
    pattern-sanitizers:
      - pattern: HtmlUtils.htmlEscape($X)
      - pattern: HtmlUtils.htmlEscape($X, ...)
      - pattern: Encoder.forHtml($X)
      - pattern: Encode.forHtml($X)
      - pattern: StringEscapeUtils.escapeHtml4($X)
      - pattern: ESAPI.encoder().encodeForHTML($X)
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-79: Cross-site Scripting"]
      confidence: HIGH
      likelihood: HIGH
      impact: MEDIUM
      vulnerability_class: [XSS]
      owasp: ["A03:2021 Injection"]
      technology: [java, spring, thymeleaf, jsp]
