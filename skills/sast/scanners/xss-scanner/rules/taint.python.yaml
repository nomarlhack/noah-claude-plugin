rules:
  - id: noah-python-xss-taint
    severity: ERROR
    languages:
      - python
    mode: taint
    message: |
      Python에서 Flask/Django request의 GET/POST/form/args가 mark_safe, Markup,
      render_template_string에 들어가면 XSS. 안전: 기본 Jinja2/Django 자동 escape,
      bleach.clean() 호이스팅.
    pattern-sources:
      - pattern: request.GET[$K]
      - pattern: request.POST[$K]
      - pattern: request.GET.get($K, ...)
      - pattern: request.POST.get($K, ...)
      - pattern: request.args[$K]
      - pattern: request.args.get($K, ...)
      - pattern: request.form[$K]
      - pattern: request.form.get($K, ...)
      - pattern: request.json
      - pattern: request.data
      - pattern: request.values[$K]
      # Tornado RequestHandler
      - pattern: self.get_argument($K)
      - pattern: self.get_argument($K, $DEFAULT)
      - pattern: self.get_body_argument($K)
      - pattern: self.get_query_argument($K)
      - pattern: self.request.arguments
      - pattern: self.request.body
      - pattern: self.request.body_arguments
      # Sanic
      - pattern: request.args.get($K)
      - pattern: request.args[$K]
      - pattern: request.form.get($K)
      - pattern: request.form[$K]
      - pattern: request.json
      - pattern: request.json.get($K)
      - pattern: await request.json()
      - pattern: request.raw_args[$K]
    pattern-sinks:
      - pattern: mark_safe($X)
      - pattern: Markup($X)
      - pattern: render_template_string($X, ...)
      - pattern: HttpResponse($X, ...)
      - pattern: HttpResponse($X)
      # Django 추가 sink
      - pattern: StreamingHttpResponse($X)
      - pattern: render_to_string($TMPL, $CTX)
      # Flask/Jinja2 — Response 직접 생성
      - pattern: make_response($X)
      - pattern: Response($X, ...)
      # FastAPI HTMLResponse
      - pattern: HTMLResponse(content=$X)
      - pattern: HTMLResponse($X)
    pattern-sanitizers:
      - pattern: bleach.clean($X, ...)
      - pattern: html.escape($X)
      - pattern: escape($X)
      - pattern: markupsafe.escape($X)
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-79: Cross-site Scripting"]
      confidence: HIGH
      likelihood: HIGH
      impact: MEDIUM
      vulnerability_class: [XSS]
      owasp: ["A03:2021 Injection"]
      technology: [python, django, flask, jinja2]
