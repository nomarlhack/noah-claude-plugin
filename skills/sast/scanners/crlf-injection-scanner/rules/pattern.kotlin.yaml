rules:
  - id: noah-kotlin-crlf-phase1-pattern
    severity: WARNING
    languages:
      - kotlin
    message: |
      crlf-injection-scanner Phase 1 sink/source 패턴 매치 (Kotlin 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # Spring HTTP 응답 헤더 sink
      - pattern-regex: 'response\.setHeader\s*\('
      - pattern-regex: 'response\.addHeader\s*\('
      - pattern-regex: 'HttpHeaders\.set\s*\('
      - pattern-regex: 'HttpHeaders\.add\s*\('
      - pattern-regex: 'ResponseEntity.*\.header\s*\('
      - pattern-regex: 'new Cookie\s*\('
      # Spring redirect
      - pattern-regex: 'response\.sendRedirect\s*\('
      - pattern-regex: 'RedirectView\s*\('
      # Spring source annotation
      - pattern-regex: '@RequestParam'
      - pattern-regex: '@PathVariable'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-93: CRLF Injection"
      confidence: LOW
      likelihood: LOW
      impact: MEDIUM
