rules:
  - id: noah-php-crlf-taint
    severity: ERROR
    languages:
      - php
    mode: taint
    message: |
      PHP $_GET/$_POST/$_REQUEST 값이 header()/setcookie()에 직접 들어가면 CRLF
      Injection (HTTP Response Splitting). PHP 5.1.2+ header()는 단일 헤더 내 개행을
      차단하나, 이전 버전·우회 케이스 점검. 안전: 화이트리스트, urlencode.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_GET[...];
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_POST[...];
      - patterns:
          - pattern: $X
          - pattern-inside: $X = $_REQUEST[...];
      # Laravel (Illuminate\Http\Request)
      - pattern: $REQ->input($K)
      - pattern: $REQ->input($K, $DEFAULT)
      - pattern: $REQ->get($K)
      - pattern: $REQ->get($K, $DEFAULT)
      - pattern: $REQ->query($K)
      - pattern: $REQ->query($K, $DEFAULT)
      - pattern: $REQ->post($K)
      - pattern: $REQ->post($K, $DEFAULT)
      - pattern: $REQ->all()
      - pattern: $REQ->only($KEYS)
      - pattern: $REQ->except($KEYS)
      - pattern: $REQ->json($K)
      - pattern: $REQ->json($K, $DEFAULT)
      - pattern: $REQ->header($K)
      - pattern: $REQ->cookie($K)
      - pattern: request()->input($K)
      - pattern: request()->get($K)
      # Symfony (HttpFoundation\Request)
      - pattern: $REQ->query->get($K)
      - pattern: $REQ->request->get($K)
      - pattern: $REQ->attributes->get($K)
      - pattern: $REQ->headers->get($K)
      - pattern: $REQ->cookies->get($K)
      - pattern: $REQ->getContent()
      # CodeIgniter 3/4
      - pattern: $CI->input->get($K)
      - pattern: $CI->input->post($K)
      - pattern: $CI->input->get_post($K)
      - pattern: $CI->input->server($K)
      - pattern: $this->input->get($K)
      - pattern: $this->input->post($K)
      - pattern: $this->request->getVar($K)
      - pattern: $this->request->getGet($K)
      - pattern: $this->request->getPost($K)
    pattern-sinks:
      - pattern: header($X);
      - pattern: setcookie($N, $X, ...);
    pattern-sanitizers:
      - pattern: urlencode($X)
      - pattern: str_replace(["\r", "\n"], "", $X)
      - pattern: preg_replace($P, "", $X)
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-93: CRLF Injection"]
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: MEDIUM
      vulnerability_class: [Injection]
      owasp: ["A03:2021 Injection"]
      technology: [php]
