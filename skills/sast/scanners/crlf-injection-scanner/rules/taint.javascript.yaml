rules:
  - id: noah-javascript-crlf-taint
    severity: ERROR
    languages:
      - javascript
      - typescript
    mode: taint
    message: |
      Node.js에서 req.* 입력이 res.setHeader/res.writeHead/res.cookie 값에 직접
      들어가면 CRLF Injection (Header Injection). Node http는 일부 개행을 차단하나
      구버전·우회 점검. 안전: 개행 제거, 화이트리스트.
    pattern-sources:
      - pattern: req.query
      - pattern: req.query.$X
      - pattern: req.params
      - pattern: req.body
      - pattern: req.body.$X
      - pattern: req.headers[$X]
      # Next.js App Router
      - pattern: searchParams.get($K)
      - pattern: searchParams[$K]
      - pattern: params[$K]
      - pattern: $REQ.nextUrl.searchParams.get($K)
      - pattern: $REQ.nextUrl.searchParams.get($K, ...)
      # Fastify
      - pattern: request.query[$K]
      - pattern: request.params[$K]
      # NestJS — decorator-based parameter injection
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Param($K) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Param() $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Query($K) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Query() $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Body($K) $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Body() $X: $T, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $M(..., @Headers($K) $X: $T, ...) { ... }
      # Hapi.js
      - pattern: request.params.$K
      - pattern: request.payload
      - pattern: request.payload.$K
      - pattern: request.query.$K
    pattern-sinks:
      - pattern: res.setHeader($N, $X)
      - pattern: res.writeHead($C, $X)
      - pattern: res.header($N, $X)
      - pattern: res.set($N, $X)
      - pattern: res.cookie($N, $X, ...)
      - pattern: res.append($N, $X)
    pattern-sanitizers:
      - pattern: $X.replace(/[\r\n]/g, "")
      - pattern: encodeURIComponent($X)
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-93: CRLF Injection"]
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: MEDIUM
      vulnerability_class: [Injection]
      owasp: ["A03:2021 Injection"]
      technology: [nodejs, express]
