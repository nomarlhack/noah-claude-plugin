rules:
  - id: noah-php-oauth-phase1-pattern
    severity: WARNING
    languages:
      - php
    message: |
      oauth-scanner Phase 1 sink/source 패턴 매치 (PHP 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'league/oauth2-client\b'
      - pattern-regex: 'league/oauth2-server\b'
      - pattern-regex: 'laravel/passport\b'
      - pattern-regex: 'getAuthorizationUrl\s*\('
      - pattern-regex: 'getAccessToken\s*\('
      - pattern-regex: 'authorization_code\b'
      - pattern-regex: 'redirect_uri\b'
      - pattern-regex: 'client_secret\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-1021: OAuth Misconfiguration"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
