rules:
  - id: noah-kotlin-oauth-phase1-pattern
    severity: WARNING
    languages:
      - kotlin
    message: |
      oauth-scanner Phase 1 sink/source 패턴 매치 (Kotlin 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'OAuth2\b'
      - pattern-regex: 'oauth2Login\s*\('
      - pattern-regex: 'AuthorizationGrantType\b'
      - pattern-regex: 'ClientRegistration\b'
      - pattern-regex: 'OAuthServerSettings\b'
      - pattern-regex: 'authorization_code\b'
      - pattern-regex: 'redirect_uri\b'
      - pattern-regex: 'client_secret\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-1021: OAuth Misconfiguration"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
