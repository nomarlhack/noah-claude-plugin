rules:
  - id: noah-javascript-oauth-misconfig-sink
    severity: ERROR
    languages:
      - javascript
      - typescript
    message: |
      OAuth 2.0 취약 설정 탐지 (JavaScript/TypeScript).
      state 파라미터 검증 생략, PKCE 미적용, implicit flow 사용,
      redirect_uri 와일드카드 허용 등 OAuth 보안 설정 결함.
    pattern-either:
      # passport-oauth2 — state 비활성
      - pattern: "new OAuth2Strategy({..., state: false, ...}, $CB)"
      # implicit flow (response_type: token) — PKCE 불가
      - pattern-regex: "response_type['\"]?\\s*:\\s*['\"]token['\"]"
      # PKCE 없이 Authorization Code Flow — code_challenge 없이 code 요청
      - pattern-regex: "generateAuthUrl\\s*\\(\\{[^}]*response_type[^}]*\\}"
      # next-auth — PKCE 비활성
      - pattern: "{ checks: ['none'] }"
      - pattern: "{ checks: [] }"
      # openid-client — skipStateCheck
      - pattern-regex: "skipStateCheck\\s*:\\s*true"
      # redirect_uri 와일드카드
      - pattern-regex: "redirect_uri['\"]?\\s*[=:]\\s*['\"]https?://[^'\"]*\\*"
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-352: CSRF via missing state", "CWE-601: Open Redirect"]
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      vulnerability_class: [OAuth Misconfiguration]
      owasp: ["A07:2021 Identification and Authentication Failures"]
      technology: [nodejs, passport-oauth2, openid-client, next-auth, google-auth-library]
