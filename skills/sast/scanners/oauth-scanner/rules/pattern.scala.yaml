rules:
  - id: noah-scala-oauth-phase1-pattern
    severity: WARNING
    languages:
      - scala
    message: |
      oauth-scanner Phase 1 sink/source 패턴 매치 (Scala 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'OAuth2\b'
      - pattern-regex: 'play-silhouette\b'
      - pattern-regex: 'authorization_code\b'
      - pattern-regex: 'redirect_uri\b'
      - pattern-regex: 'client_secret\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-1021: OAuth Misconfiguration"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
