rules:
  - id: noah-go-oauth-phase1-pattern
    severity: WARNING
    languages:
      - go
    message: |
      oauth-scanner Phase 1 sink/source 패턴 매치 (Go 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'golang\.org/x/oauth2\b'
      - pattern-regex: 'coreos/go-oidc\b'
      - pattern-regex: 'oauth2\.Config\b'
      - pattern-regex: 'AuthCodeURL\s*\('
      - pattern-regex: '\.Exchange\s*\('
      - pattern-regex: 'authorization_code\b'
      - pattern-regex: 'redirect_uri\b'
      - pattern-regex: 'client_secret\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-1021: OAuth Misconfiguration"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
