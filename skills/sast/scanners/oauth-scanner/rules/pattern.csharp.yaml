rules:
  - id: noah-csharp-oauth-phase1-pattern
    severity: WARNING
    languages:
      - csharp
    message: |
      oauth-scanner Phase 1 sink/source 패턴 매치 (C# 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'Microsoft\.Identity\.Web\b'
      - pattern-regex: 'AddMicrosoftIdentityWebApi\b'
      - pattern-regex: 'AddOAuth\s*\('
      - pattern-regex: 'AddOpenIdConnect\s*\('
      - pattern-regex: 'authorization_code\b'
      - pattern-regex: 'redirect_uri\b'
      - pattern-regex: 'client_secret\b'
      - pattern-regex: 'IdentityServer4\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-1021: OAuth Misconfiguration"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
