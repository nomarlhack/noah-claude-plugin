rules:
  - id: noah-python-zipslip-phase1-pattern
    severity: WARNING
    languages:
      - python
    message: |
      zipslip-scanner Phase 1 sink/source 패턴 매치 (Python 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'zipfile\.extractall\s*\('
      - pattern-regex: 'zipfile\.extract\s*\('
      - pattern-regex: 'ZipFile\s*\('
      - pattern-regex: 'tarfile\.extractall\s*\('
      - pattern-regex: 'tarfile\.extract\s*\('
      - pattern-regex: 'TarFile\s*\('
      - pattern-regex: '\.filename\b'
      - pattern-regex: 'rarfile\b'
      - pattern-regex: 'py7zr\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-22: Zip Slip / Path Traversal"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
