rules:
  - id: noah-go-zipslip-phase1-pattern
    severity: WARNING
    languages:
      - go
    message: |
      zipslip-scanner Phase 1 sink/source 패턴 매치 (Go 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'archive/zip\b'
      - pattern-regex: 'archive/tar\b'
      - pattern-regex: 'zip\.OpenReader\b'
      - pattern-regex: 'zip\.NewReader\b'
      - pattern-regex: 'tar\.NewReader\b'
      - pattern-regex: '\.Next\s*\('
      - pattern-regex: '\.Name\b'
      - pattern-regex: 'mholt/archiver\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-22: Zip Slip / Path Traversal"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
