rules:
  - id: noah-ruby-zipslip-taint
    severity: ERROR
    languages:
      - ruby
    mode: taint
    message: |
      Ruby에서 Zip::Entry#name / Gem::Package 엔트리 이름이 경로 검증 없이
      파일 write sink에 전달되면 Zip Slip.
      안전: File.expand_path 후 허용 디렉터리 prefix 검증.
    pattern-sources:
      # rubyzip
      - pattern: $ENTRY.name
      - pattern: entry.name
      # Gem::Package (tar 기반)
      - pattern: $ENTRY.full_name
      - pattern: $HDR.name

    pattern-sinks:
      - pattern: File.open($X, ...)
      - pattern: File.open(File.join($BASE, $X), ...)
      - pattern: File.write($X, ...)
      - pattern: File.join($BASE, $X)
      - pattern: FileUtils.mkdir_p($X)
      - pattern: FileUtils.cp($SRC, $X)

    pattern-sanitizers:
      - pattern: File.basename($X)
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $DEST = File.expand_path(File.join($BASE, $X))
              raise unless $DEST.start_with?($BASE)

    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-22: Improper Limitation of a Pathname to a Restricted Directory"]
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      vulnerability_class: [Path Traversal]
      owasp: ["A01:2021 Broken Access Control"]
      technology: [ruby, rubyzip, rubygems]
