rules:
  - id: noah-ruby-zipslip-phase1-pattern
    severity: WARNING
    languages:
      - ruby
    message: |
      zipslip-scanner Phase 1 sink/source 패턴 매치 (Ruby 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'Zip::\b'
      - pattern-regex: 'rubyzip\b'
      - pattern-regex: 'Gem::Package\b'
      - pattern-regex: '\.full_name\b'
      - pattern-regex: 'entry\.name\b'
      - pattern-regex: 'tar\.extract\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-22: Zip Slip / Path Traversal"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
