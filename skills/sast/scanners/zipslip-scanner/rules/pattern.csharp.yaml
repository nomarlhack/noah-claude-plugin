rules:
  - id: noah-csharp-zipslip-phase1-pattern
    severity: WARNING
    languages:
      - csharp
    message: |
      zipslip-scanner Phase 1 sink/source 패턴 매치 (C# 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'ZipArchive\b'
      - pattern-regex: 'ZipArchiveEntry\b'
      - pattern-regex: '\.FullName\b'
      - pattern-regex: 'ZipFile\.OpenRead\b'
      - pattern-regex: 'ExtractToFile\s*\('
      - pattern-regex: 'ICSharpCode\.SharpZipLib\b'
      - pattern-regex: 'SharpZipLib\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-22: Zip Slip / Path Traversal"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
