rules:
  - id: noah-typescript-zipslip-phase1-pattern
    severity: WARNING
    languages:
      - typescript
    message: |
      zipslip-scanner Phase 1 sink/source 패턴 매치 (TypeScript 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'adm-zip\b'
      - pattern-regex: 'AdmZip\b'
      - pattern-regex: 'unzipper\b'
      - pattern-regex: 'unzip-stream\b'
      - pattern-regex: 'yauzl\b'
      - pattern-regex: 'decompress\b'
      - pattern-regex: 'node-tar\b'
      - pattern-regex: '\.entryName\b'
      - pattern-regex: '\.fileName\b'
      - pattern-regex: 'extractAllTo\s*\('
      - pattern-regex: 'extractEntryTo\s*\('
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-22: Zip Slip / Path Traversal"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
