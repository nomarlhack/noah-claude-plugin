rules:
  - id: noah-python-zipslip-taint
    severity: ERROR
    languages:
      - python
    mode: taint
    message: |
      Python에서 ZipFile/TarFile 엔트리 이름이 경로 검증 없이 파일 write sink에
      들어가면 Zip Slip. 공격자가 "../../../etc/cron.d/shell" 같은 경로를 삽입해
      임의 경로에 파일을 쓸 수 있음.
      안전: os.path.abspath + 허용 디렉터리 prefix 검증, ZipFile.extractall(path=SAFE).
    pattern-sources:
      # zipfile
      - pattern: $MEMBER.filename
      - pattern: $INFO.filename
      - pattern: $ENTRY.filename
      # tarfile
      - pattern: $MEMBER.name
      - pattern: $TARINFO.name

    pattern-sinks:
      - pattern: open($X, ...)
      - pattern: open(os.path.join($BASE, $X), ...)
      - pattern: os.path.join($BASE, $X)
      - pattern: shutil.copy($SRC, $X)
      - pattern: shutil.move($SRC, $X)
      - pattern: pathlib.Path($BASE) / $X
      - pattern: ($BASE / $X).open(...)

    pattern-sanitizers:
      - pattern: os.path.basename($X)
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $ABS = os.path.abspath(os.path.join($BASE, $X))
              if not $ABS.startswith($BASE):
                  ...
      - patterns:
          - pattern: $X
          - pattern-inside: |
              if ".." in $X:
                  ...

    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-22: Improper Limitation of a Pathname to a Restricted Directory"
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      vulnerability_class:
        - Path Traversal
      owasp:
        - "A01:2021 Broken Access Control"
      technology:
        - python
        - zipfile
        - tarfile
