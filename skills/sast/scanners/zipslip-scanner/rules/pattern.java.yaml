rules:
  - id: noah-java-zipslip-phase1-pattern
    severity: WARNING
    languages:
      - java
    message: |
      zipslip-scanner Phase 1 sink/source 패턴 매치 (Java 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      - pattern-regex: 'ZipInputStream\b'
      - pattern-regex: 'ZipFile\b'
      - pattern-regex: 'ZipEntry\b'
      - pattern-regex: 'getNextEntry\s*\('
      - pattern-regex: 'getNextZipEntry\s*\('
      - pattern-regex: 'getNextTarEntry\s*\('
      - pattern-regex: 'TarArchiveInputStream\b'
      - pattern-regex: 'TarArchiveEntry\b'
      - pattern-regex: 'entry\.getName\s*\('
      - pattern-regex: 'getFileName\s*\('
      - pattern-regex: 'zip4j\b'
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-22: Zip Slip / Path Traversal"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
