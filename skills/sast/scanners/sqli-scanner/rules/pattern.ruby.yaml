rules:
  - id: noah-ruby-sqli-phase1-pattern
    severity: WARNING
    languages:
      - ruby
    message: |
      sqli-scanner Phase 1 sink/source 패턴 매치 (Ruby 한정).
      후보 수집용 — 정탐 판정은 코드 컨텍스트(source 도달성, sanitizer 부재)를 확인한 후 수행.
    pattern-either:
      # ActiveRecord 위험 패턴
      - pattern-regex: 'find_by_sql'
      - pattern-regex: '\.where\s*\(\s*["'']'
      - pattern-regex: '\.having\s*\(\s*["'']'
      - pattern-regex: '\.joins\s*\(\s*["'']'
      - pattern-regex: '\.order\s*\(\s*["'']'
      - pattern-regex: '\.group\s*\(\s*["'']'
      - pattern-regex: 'Arel\.sql\s*\('
      - pattern-regex: 'sanitize_sql'
      # ActiveRecord connection 직접 실행
      - pattern-regex: '\.connection\.execute\s*\('
      - pattern-regex: '\.connection\.exec_query\s*\('
      - pattern-regex: 'ActiveRecord::Base\.connection'
      # Sequel
      - pattern-regex: 'Sequel\.lit\s*\('
      - pattern-regex: '\.where\s*\(Sequel\.lit'
      # params source
      - pattern-regex: 'params\['
      - pattern-regex: 'request\.params\['
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-89: SQL Injection"
      confidence: LOW
      likelihood: LOW
      impact: HIGH
