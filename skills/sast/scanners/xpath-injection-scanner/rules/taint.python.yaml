rules:
  - id: noah-python-xpath-taint
    severity: ERROR
    languages:
      - python
    mode: taint
    message: |
      Python에서 HTTP 입력이 lxml/ElementTree xpath/findall 식에 문자열 결합으로
      들어가면 XPath Injection. 안전: XPath 변수 바인딩, 화이트리스트.
    pattern-sources:
      - pattern: request.GET[$K]
      - pattern: request.POST[$K]
      - pattern: request.args.get($K, ...)
      - pattern: request.form.get($K, ...)
      # Tornado RequestHandler
      - pattern: self.get_argument($K)
      - pattern: self.get_argument($K, $DEFAULT)
      - pattern: self.get_body_argument($K)
      - pattern: self.get_query_argument($K)
      - pattern: self.request.arguments
      - pattern: self.request.body
      - pattern: self.request.body_arguments
      # Sanic
      - pattern: request.args.get($K)
      - pattern: request.args[$K]
      - pattern: request.form.get($K)
      - pattern: request.form[$K]
      - pattern: request.json
      - pattern: request.json.get($K)
      - pattern: await request.json()
      - pattern: request.raw_args[$K]
    pattern-sinks:
      - pattern: $TREE.xpath($X)
      - pattern: $TREE.xpath($X, ...)
      - pattern: $TREE.find($X)
      - pattern: $TREE.findall($X)
      - pattern: $TREE.findtext($X)
      - pattern: etree.XPath($X)
    pattern-sanitizers:
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $TREE.xpath($EXPR, $VAR=$X)
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-643: XPath Injection"]
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      vulnerability_class: [Injection]
      owasp: ["A03:2021 Injection"]
      technology: [python, lxml]
