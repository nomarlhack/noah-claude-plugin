rules:
  - id: noah-java-xpath-taint
    severity: ERROR
    languages:
      - java
    mode: taint
    message: |
      Java Spring 컨트롤러 입력이 XPath.compile/evaluate 식에 문자열 결합으로 들어가면
      XPath Injection. 안전: XPathVariableResolver로 변수 바인딩.
    pattern-sources:
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @RequestParam $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @PathVariable $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @RequestBody $X, ...) { ... }
      # JAX-RS / Jersey / Quarkus — REST resource method parameters
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @QueryParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @PathParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @FormParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @HeaderParam($K) $X, ...) { ... }
      - patterns:
          - pattern: $X
          - pattern-inside: |
              $T $METHOD(..., @MatrixParam($K) $X, ...) { ... }
      # Vert.x (reactive web)
      - pattern: $CTX.queryParam($K)
      - pattern: $CTX.queryParam($K).get(0)
      - pattern: $CTX.pathParam($K)
      - pattern: $CTX.body().asString()
      - pattern: $CTX.body().asJsonObject()
      - pattern: $REQ.getParam($K)
      - pattern: $REQ.params().get($K)
      # Struts2 / Struts1 — ActionContext / ActionForm
      - pattern: ActionContext.getContext().getParameters()
      - pattern: $FORM.get($K)
      - pattern: $SERVLET.getParameter($K)
      - pattern: $SERVLET.getParameterValues($K)
    pattern-sinks:
      - pattern: $XPATH.compile($X)
      - pattern: $XPATH.evaluate($X, ...)
      - pattern: $XPATH.evaluateExpression($X, ...)
    pattern-sanitizers:
      - pattern: $XPATH.setXPathVariableResolver($R)
    metadata:
      category: security
      subcategory: [vuln]
      cwe: ["CWE-643: XPath Injection"]
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      vulnerability_class: [Injection]
      owasp: ["A03:2021 Injection"]
      technology: [java]
